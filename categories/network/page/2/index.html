route":"/posts/1124a628/","abbrlink":"1124a628","title":"NAT穿透","date":"2020-04-22 11:33:26","updated":"2020-04-22 11:33:26","tags":["NAT","UDP"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003ch2 id=\"nat-网络地址转换\"\u003eNAT 网络地址转换\u003c/h2\u003e\n\u003cp\u003e网络地址转换 NAT (Network Address Translation)  方法于1994年提出。\u003cbr\u003e\n需要在专用网连接到互联网的路由器上安装 NAT 软件。装有 NAT 软件的路由器叫作 NAT路由器，它至少有一个有效的外部全球IP地址。\u003cbr\u003e\n所有使用本地地址的主机在和外界通信时，都要在 NAT 路由器上将其本地地址转换成全球 IP 地址，才能和互联网连接。\u003c/p\u003e\n\u003ch3 id=\"网络地址转换的过程\"\u003e网络地址转换的过程\u003c/h3\u003e\n\u003cp\u003e内部主机 A 用本地地址 IPA 和互联网上主机 B 通信所发送的数据报必须经过 NAT 路由器。\u003cbr\u003e\nNAT 路由器将数据报的源地址 IPA 转换成全球地址 IPG，\u003cstrong\u003e并把转换结果记录到NAT地址转换表中\u003c/strong\u003e，目的地址 IPB 保持不变，然后发送到互联网。\u003cbr\u003e\nNAT 路由器收到主机 B 发回的数据报时，知道数据报中的源地址是 IPB 而目的地址是 IPG。\u003cbr\u003e\n根据 NAT 转换表，NAT 路由器将目的地址 IPG 转换为 IPA，转发给最终的内部主机 A。\u003c/p\u003e\n\u003cp\u003e网络地址转换表例子:\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-markdown\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e+-------------+---------------+\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e| private IP  |   public IP   |\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e+-------------+---------------+\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e| 192.168.1.55|219.152.168.222|\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e+-------------+---------------+\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e| 192.168.1.59|219.152.168.223|\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e+-------------+---------------+\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e|192.168.1.155|219.152.168.224|\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e+-------------+---------------+\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"1124a628","wip":false,"comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/http-Keep-Alive/doc.md","route":"/posts/d91b7c06/","abbrlink":"d91b7c06","title":"http Keep-Alive","date":"2019-12-23 23:37:32","updated":"2019-12-23 23:37:32","tags":["HTTP","Proxy"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003ch2 id=\"http-keep-alive\"\u003ehttp keep-alive\u003c/h2\u003e\n\u003cp\u003ehttp头部\u003ccode\u003eConnection: Keep-Alive\u003c/code\u003e代表连接请求保持长连接\u003cbr\u003e\n\u003cstrong\u003e如果是http代理,必须处理\u003ccode\u003eProxy-Connection: Keep-Alive\u003c/code\u003e为\u003ccode\u003eConnection: Keep-Alive\u003c/code\u003e,如果代理没有实现\u003ccode\u003eKeep-Alive\u003c/code\u003e就不变或者将Connection设为close.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e优点:减少握手次数,如下图(图来源文章最下面)\u003cbr\u003e\n\u003cimg src=\"/posts/d91b7c06/9f505c5f2b72.png\" alt=\"keep-alive\" loading=\"lazy\" decoding=\"async\"\u003e\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"d91b7c06","wip":false,"comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/CIDR匹配 域名匹配/doc.md","route":"/posts/3cb4313e/","abbrlink":"3cb4313e","title":"CIDR匹配 域名匹配","date":"2019-08-02 18:55:15","updated":"2020-06-23 00:55:15","tags":["CIDR","Go"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e所有完整实现代码:\u003ca href=\"https://github.com/Asutorufa/yuhaiin/tree/master/net/match\"\u003ematch\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"cidr\"\u003eCIDR\u003c/h2\u003e\n\u003cp\u003e我们知道cidr对ip匹配时,只要cidr的mask长度的前几位与要匹配的ip相同,则可以说匹配成功.\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-bash\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e假设有一个cidr为128.0.0.1/24\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e转换为二进制\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 0001/24\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e可以知道要匹配ip的前24为与cidr的前24(1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e)位相同则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e假设有一个ip\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 128.0.0.128\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 二进制为\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e可以看到前24位与cidr相同\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"域名\"\u003e域名\u003c/h2\u003e\n\u003cp\u003e域名就比较简单了,直接按点分割就行了\u003c/p\u003e\n\u003ch2 id=\"前缀树\"\u003e前缀树\u003c/h2\u003e\n\u003cp\u003e通过上述规则 我们可以使用前缀树实现CIDR对ip的匹配\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003egraph TD\n  R((root))\n  R --&gt; B0[&quot;0&quot;]\n  R --&gt; B1[&quot;1&quot;]\n  B0 --&gt; B00[&quot;0&quot;]\n  B0 --&gt; B01[&quot;1&quot;]\n  B1 --&gt; B10[&quot;0&quot;]\n  B1 --&gt; B11[&quot;1&quot;]\n  B00 --&gt; END[&quot;CIDR末尾(isLast=true)&quot;]\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003e当ip匹配到某处时，此处已无任何子树，且是某一cidr的末尾则匹配成功。\u003cbr\u003e\n若此处节点为null(golang为nil)且不是某一cidr的末尾则匹配失败。\u003c/p\u003e\n\u003cp\u003e域名的前缀树相同,只不过域名不再是只有0和1,而且在匹配的时候还需要跳过前面的那些前缀.\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003egraph TD\n  R((root))\n  R --&gt; FB[&quot;facebook&quot;]\n  R --&gt; GG[&quot;google&quot;]\n  R --&gt; TW[&quot;twitter&quot;]\n  FB --&gt; COM1[&quot;com&quot;]\n  GG --&gt; COM2[&quot;com&quot;]\n  GG --&gt; MAIL[&quot;mail&quot;]\n  MAIL --&gt; COM3[&quot;com&quot;]\n  TW --&gt; COM4[&quot;com&quot;]\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003e在对域名匹配时，如对 \u003ccode\u003ewww.play.google.com\u003c/code\u003e 匹配：\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e没有 \u003ccode\u003ewww\u003c/code\u003e，跳过\u003c/li\u003e\n\u003cli\u003e没有 \u003ccode\u003eplay\u003c/code\u003e，跳过\u003c/li\u003e\n\u003cli\u003e有 \u003ccode\u003egoogle\u003c/code\u003e，继续\u003c/li\u003e\n\u003cli\u003e有 \u003ccode\u003ecom\u003c/code\u003e 且域名已为最后一个节点，判断trie中是否为最后的一个子树；是则匹配成功\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e这里有一个明显的问题：\u003cbr\u003e\n比如我们同时插入了 \u003ccode\u003emusic.126.com\u003c/code\u003e 和 \u003ccode\u003e163.com\u003c/code\u003e，然后查询 \u003ccode\u003emusic.163.com\u003c/code\u003e 是否被匹配，无法被匹配。因为包含 \u003ccode\u003emusic\u003c/code\u003e，会匹配到 \u003ccode\u003emusic.126.com\u003c/code\u003e 这条线，而不是 \u003ccode\u003e163.com\u003c/code\u003e。\u003c/p\u003e\n\u003cp\u003e这里有个很简单的解决方法，就是把域名倒过来插入、倒过来匹配，就跟 JAVA 包名那样。\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003egraph TD\n  R((root))\n  R --&gt; COM[&quot;com&quot;]\n  COM --&gt; D163[&quot;163&quot;]\n  COM --&gt; D126[&quot;126&quot;]\n  D126 --&gt; MUSIC[&quot;music&quot;]\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003e这样就能被正确匹配了，而且会缩短时间，不会去完整匹配整个域名，只匹配后面有的就行了。\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003eflowchart TD\n  A[输入域名] --&gt; B[按点分段并倒序]\n  B --&gt; C{当前段在trie存在?}\n  C -- 否 --&gt; D[停止并返回不匹配]\n  C -- 是 --&gt; E[进入下一层]\n  E --&gt; F{当前节点isLast?}\n  F -- 是 --&gt; G[匹配成功]\n  F -- 否 --&gt; H[继续下一段]\n  H --&gt; C\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003etrie树类似上述结构\u003c/p\u003e\n\u003cp\u003etrie树节点可以这样表示：\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"3cb4313e","wip":false,"comments":true,"math":false,"mermaid":true},{"kind":"post","sourcePath":"source/_posts/golang socks5⁄http server/doc.md","route":"/posts/c7816edc/","abbrlink":"c7816edc","title":"golang socks5/http proxy","date":"2019-03-06 20:02:47","updated":"2020-05-30 00:00:00","tags":["Socks5","Go"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e完整实现代码:\u003cbr\u003e\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/client/socks5client.go\"\u003esocks5 client\u003c/a\u003e\u003cbr\u003e\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/server/server.go\"\u003esocks5 server\u003c/a\u003e\u003cbr\u003e\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/http/server/server.go\"\u003ehttp server\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003e此处已socks5client为例,大致流程都相同,只是协议不同:\u003c/p\u003e\n\u003cp\u003esocks5运行流程如下:\u003c/p\u003e\n\u003cp\u003etcp:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e本机和代理服务端协商和建立连接；\u003c/li\u003e\n\u003cli\u003e本机告诉代理服务端目标服务的地址；\u003c/li\u003e\n\u003cli\u003e代理服务端去连接目标服务，成功后告诉本机；\u003c/li\u003e\n\u003cli\u003e本机开始发送原本应发送到目标服务的数据给代理服务端，由代理服务端完成数据转发。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eudp:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eudp因为是无连接的,所以所以数据一次只用一个udp包\u003c/li\u003e\n\u003cli\u003esocks5是通过tcp先确认socks5 server支持udp,然后再通过udp发送请求\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"先进行tcp连接\"\u003e先进行TCP连接\u003c/h2\u003e\n\u003cp\u003egolang实现(\u003cem\u003e这里的地址我是本地socks5服务端\u003c/em\u003e)\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-go\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003econn, err \u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e:=\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e net.\u003c/span\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003eDial\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e(\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e\"tcp\"\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e, \u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e\"127.0.0.1:1080\"\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003eif\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e err \u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e!=\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e nil\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e {\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e\tfmt.\u003c/span\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003ePrintln\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e(err)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e\treturn\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e}\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"向socks5服务端发送验证\"\u003e向socks5服务端发送验证\u003c/h2\u003e\n\u003cp\u003e验证字段:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth style=\"text-align:center\"\u003eVER\u003c/th\u003e\n\u003cth style=\"text-align:center\"\u003eNMETHODS\u003c/th\u003e\n\u003cth style=\"text-align:center\"\u003eMETHODS\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd style=\"text-align:center\"\u003e1字节\u003c/td\u003e\n\u003ctd style=\"text-align:center\"\u003e1字节\u003c/td\u003e\n\u003ctd style=\"text-align:center\"\u003e1-255字节\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eVER是SOCKS版本，这里应该是0x05；\u003c/li\u003e\n\u003c/ul\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"c7816edc","wip":false,"comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/用CIDR表示网段/doc.md","route":"/posts/e2b25bb8/","abbrlink":"e2b25bb8","title":"用CIDR表示网段","date":"2019-02-02 22:34:07","updated":"2019-02-02 22:34:07","tags":["IP","CIDR"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e我们知道一般CIDR(无类别域间路由)网段的表示为:\u003cstrong\u003e192.168.0.0/24\u003c/strong\u003e这种形式\u003c/p\u003e\n\u003ch2 id=\"ip地址\"\u003eIP地址\u003c/h2\u003e\n\u003cp\u003e首先我们得知道ip地址是如何来的\u003cbr\u003e\nipv4的地址是用32位二进制数表示的\u003cbr\u003e\n如: 255.255.255.0 -&gt; 11111111.11111111.11111111.00000000\u003c/p\u003e\n\u003ch2 id=\"网络前缀\"\u003e网络前缀\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e192.168.0.0/24\u003c/strong\u003e中的24就是网络前缀,网络前缀可转化为网络掩码,24表示网络掩码的前24位为1\u003c/p\u003e\n\u003ch2 id=\"网络掩码\"\u003e网络掩码\u003c/h2\u003e\n\u003cp\u003e「网络掩码」又叫「子网掩码」、「地址掩码」、「子網路遮罩」（subnet mask），它是一种用来指明一个IP地址的哪些位标识的是主机所在的网络地址以及哪些位标识的是主机地址的位掩码。      --维基百科\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"e2b25bb8","wip":false,"comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/让win10的UWP应用走代理/doc.md","route":"/posts/d22ffdb6/","abbrlink":"d22ffdb6","title":"让win10的UWP应用走代理","date":"2018-02-08 15:09:16","updated":"2020-03-01 15:09:16","tags":["Proxy"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003ch2 id=\"原因\"\u003e原因\u003c/h2\u003e\n\u003cp\u003e因为uwp应用的特殊性,即使使用proxifier和proxycap这种应用也无法让其走代理\u003c/p\u003e\n\u003ch2 id=\"现在可直接用windowsloopbackmanager\"\u003e现在可直接用WindowsLoopbackManager\u003c/h2\u003e\n\u003cp\u003e\u003ca href=\"https://github.com/tiagonmas/Windows-Loopback-Exemption-Manager\"\u003eWindowsLoopbackManager\u003c/a\u003e\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"d22ffdb6","wip":false,"comments":true,"math":false,"mermaid":false}],"totalPages":2,"totalPosts":16}</script><script type="module" src="/assets/index-AvuwV2oc.js"></script></body></html>
