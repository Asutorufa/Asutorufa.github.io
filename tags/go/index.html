H的最主要的区别是把DNS使用的UDP,换成了HTTPS,这样就能防止DNS污染了,而且可以使用DNSSEC加上ESNI来防止证书劫持,DOH的协议在\u003ca href=\"https://tools.ietf.org/html/rfc8484\"\u003erfc8484\u003c/a\u003e中有定义\u003cbr\u003e\nDOH主要有两种方式HTTP的GET请求和POST的请求\u003c/p\u003e\n\u003ch2 id=\"get\"\u003eGET\u003c/h2\u003e\n\u003cp\u003eGET请求需要使用BASE64对请求的字节数据进行序列化,然后作为参数传递,获取到的数据使用我们之前的解析进行解析就行了\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-go\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003efunc\u003c/span\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e get\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e(\u003c/span\u003e\u003cspan style=\"color:#E36209;--shiki-dark:#FFAB70\"\u003edReq\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e []\u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003ebyte\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e, \u003c/span\u003e\u003cspan style=\"color:#E36209;--shiki-dark:#FFAB70\"\u003eserver\u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e string\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e) (\u003c/span\u003e\u003cspan style=\"color:#E36209;--shiki-dark:#FFAB70\"\u003ebody\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e []\u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003ebyte\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e, \u003c/span\u003e\u003cspan style=\"color:#E36209;--shiki-dark:#FFAB70\"\u003eerr\u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e error\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e) {\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\  class=\"code-line-content\"\u003e+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|                    QDCOUNT                    |\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|                    ANCOUNT                    |\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|                    NSCOUNT                    |\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|                    ARCOUNT                    |\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+--+\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eheader在dns请求和应答中相同的,查询中有Query Section,应答中有answer section.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eID: 2字节,应答中也有ID,可以用来判断是否为我们请求的应答\u003c/li\u003e\n\u003cli\u003eQR：1bit,请求时为0,应答时为1\u003c/li\u003e\n\u003cli\u003eOpcode：4bit 通常值为0（标准查询），其他值为1（反向查询）和2（服务器状态请求）,[3,15]保留值\u003c/li\u003e\n\u003cli\u003eAA：1bit authoritative answer,在应答中才有效\u003c/li\u003e\n\u003cli\u003eTC：1bit 表示可截断\u003c/li\u003e\n\u003cli\u003eRD：1bit 期望使用递归查询\u003c/li\u003e\n\u003cli\u003eRA：1bit 在应答中返回,返回服务器是否支持递归查询\u003c/li\u003e\n\u003cli\u003eZ： Reserved for future use.\u003c/li\u003e\n\u003cli\u003eRCODE：4bit,应答码,代表返回的状态\n\u003cul\u003e\n\u003cli\u003e0 No Error\u003c/li\u003e\n\u003cli\u003e1 Format error 格式错误\u003c/li\u003e\n\u003cli\u003e2 Server failure 服务器失败\u003c/li\u003e\n\u003cli\u003e3 Name Error 查询域名错误\u003c/li\u003e\n\u003cli\u003e4 Not Implemented 未实现的查询方式\u003c/li\u003e\n\u003cli\u003e5 Refused 拒绝\u003c/li\u003e\n\u003cli\u003e6-15 Reserved for future use.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"f05986bf","wip":false,"comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/CIDR匹配 域名匹配/doc.md","route":"/posts/3cb4313e/","abbrlink":"3cb4313e","title":"CIDR匹配 域名匹配","date":"2019-08-02 18:55:15","updated":"2020-06-23 00:55:15","tags":["CIDR","Go"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e所有完整实现代码:\u003ca href=\"https://github.com/Asutorufa/yuhaiin/tree/master/net/match\"\u003ematch\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"cidr\"\u003eCIDR\u003c/h2\u003e\n\u003cp\u003e我们知道cidr对ip匹配时,只要cidr的mask长度的前几位与要匹配的ip相同,则可以说匹配成功.\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-bash\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e假设有一个cidr为128.0.0.1/24\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e转换为二进制\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 0001/24\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e可以知道要匹配ip的前24为与cidr的前24(1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e)位相同则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e假设有一个ip\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 128.0.0.128\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 二进制为\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e可以看到前24位与cidr相同\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"域名\"\u003e域名\u003c/h2\u003e\n\u003cp\u003e域名就比较简单了,直接按点分割就行了\u003c/p\u003e\n\u003ch2 id=\"前缀树\"\u003e前缀树\u003c/h2\u003e\n\u003cp\u003e通过上述规则 我们可以使用前缀树实现CIDR对ip的匹配\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003egraph TD\n  R((root))\n  R --&gt; B0[&quot;0&quot;]\n  R --&gt; B1[&quot;1&quot;]\n  B0 --&gt; B00[&quot;0&quot;]\n  B0 --&gt; B01[&quot;1&quot;]\n  B1 --&gt; B10[&quot;0&quot;]\n  B1 --&gt; B11[&quot;1&quot;]\n  B00 --&gt; END[&quot;CIDR末尾(isLast=true)&quot;]\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003e当ip匹配到某处时，此处已无任何子树，且是某一cidr的末尾则匹配成功。\u003cbr\u003e\n若此处节点为null(golang为nil)且不是某一cidr的末尾则匹配失败。\u003c/p\u003e\n\u003cp\u003e域名的前缀树相同,只不过域名不再是只有0和1,而且在匹配的时候还需要跳过前面的那些前缀.\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003egraph TD\n  R((root))\n  R --&gt; FB[&quot;facebook&quot;]\n  R --&gt; GG[&quot;google&quot;]\n  R --&gt; TW[&quot;twitter&quot;]\n  FB --&gt; COM1[&quot;com&quot;]\n  GG --&gt; COM2[&quot;com&quot;]\n  GG --&gt; MAIL[&quot;mail&quot;]\n  MAIL --&gt; COM3[&quot;com&quot;]\n  TW --&gt; COM4[&quot;com&quot;]\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003e在对域名匹配时，如对 \u003ccode\u003ewww.play.google.com\u003c/code\u003e 匹配：\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e没有 \u003ccode\u003ewww\u003c/code\u003e，跳过\u003c/li\u003e\n\u003cli\u003e没有 \u003ccode\u003eplay\u003c/code\u003e，跳过\u003c/li\u003e\n\u003cli\u003e有 \u003ccode\u003egoogle\u003c/code\u003e，继续\u003c/li\u003e\n\u003cli\u003e有 \u003ccode\u003ecom\u003c/code\u003e 且域名已为最后一个节点，判断trie中是否为最后的一个子树；是则匹配成功\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e这里有一个明显的问题：\u003cbr\u003e\n比如我们同时插入了 \u003ccode\u003emusic.126.com\u003c/code\u003e 和 \u003ccode\u003e163.com\u003c/code\u003e，然后查询 \u003ccode\u003emusic.163.com\u003c/code\u003e 是否被匹配，无法被匹配。因为包含 \u003ccode\u003emusic\u003c/code\u003e，会匹配到 \u003ccode\u003emusic.126.com\u003c/code\u003e 这条线，而不是 \u003ccode\u003e163.com\u003c/code\u003e。\u003c/p\u003e\n\u003cp\u003e这里有个很简单的解决方法，就是把域名倒过来插入、倒过来匹配，就跟 JAVA 包名那样。\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003egraph TD\n  R((root))\n  R --&gt; COM[&quot;com&quot;]\n  COM --&gt; D163[&quot;163&quot;]\n  COM --&gt; D126[&quot;126&quot;]\n  D126 --&gt; MUSIC[&quot;music&quot;]\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003e这样就能被正确匹配了，而且会缩短时间，不会去完整匹配整个域名，只匹配后面有的就行了。\u003c/p\u003e\n\u003cdiv class=\"mermaid mermaid-pending\" aria-busy=\"true\"\u003e\u003ctemplate data-mermaid-source\u003eflowchart TD\n  A[输入域名] --&gt; B[按点分段并倒序]\n  B --&gt; C{当前段在trie存在?}\n  C -- 否 --&gt; D[停止并返回不匹配]\n  C -- 是 --&gt; E[进入下一层]\n  E --&gt; F{当前节点isLast?}\n  F -- 是 --&gt; G[匹配成功]\n  F -- 否 --&gt; H[继续下一段]\n  H --&gt; C\n\u003c/template\u003e\u003c/div\u003e\u003cp\u003etrie树类似上述结构\u003c/p\u003e\n\u003cp\u003etrie树节点可以这样表示：\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"3cb4313e","wip":false,"comments":true,"math":false,"mermaid":true},{"kind":"post","sourcePath":"source/_posts/golang实现子进程后台/doc.md","route":"/posts/89c4c907/","abbrlink":"89c4c907","title":"golang实现子进程后台","date":"2019-06-09 10:34:04","updated":"2019-06-09 10:34:04","tags":["Go","Linux","Windows"],"categories":["Go"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003ch2 id=\"系统的进程机制\"\u003e系统的进程机制\u003c/h2\u003e\n\u003ch3 id=\"linux\"\u003elinux\u003c/h3\u003e\n\u003cpre class=\"shiki code-block\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003elinux下的进程机制,当父进程被杀死之后,子进程就被系统接管\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+系统\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|-父进程 -&gt; system管理\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|--子进程 -&gt; 父进程管理\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e当父进程被杀死之后\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+系统\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|-父进程 -&gt; 被杀死\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|--子进程 -&gt; system管理\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e如果子进程被杀死,而且父进程没有处理子进程的善后工作,那么子进程就会变成僵尸进程\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e+系统\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|-父进程 -&gt; system管理\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e|--子进程(被杀死) -&gt; 僵尸进程\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"89c4c907","wip":false,"comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/golang socks5⁄http server/doc.md","route":"/posts/c7816edc/","abbrlink":"c7816edc","title":"golang socks5/http proxy","date":"2019-03-06 20:02:47","updated":"2020-05-30 00:00:00","tags":["Socks5","Go"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e完整实现代码:\u003cbr\u003e\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/client/socks5client.go\"\u003esocks5 client\u003c/a\u003e\u003cbr\u003e\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/server/server.go\"\u003esocks5 server\u003c/a\u003e\u003cbr\u003e\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/http/server/server.go\"\u003ehttp server\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003e此处已socks5client为例,大致流程都相同,只是协议不同:\u003c/p\u003e\n\u003cp\u003esocks5运行流程如下:\u003c/p\u003e\n\u003cp\u003etcp:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e本机和代理服务端协商和建立连接；\u003c/li\u003e\n\u003cli\u003e本机告诉代理服务端目标服务的地址；\u003c/li\u003e\n\u003cli\u003e代理服务端去连接目标服务，成功后告诉本机；\u003c/li\u003e\n\u003cli\u003e本机开始发送原本应发送到目标服务的数据给代理服务端，由代理服务端完成数据转发。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eudp:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eudp因为是无连接的,所以所以数据一次只用一个udp包\u003c/li\u003e\n\u003cli\u003esocks5是通过tcp先确认socks5 server支持udp,然后再通过udp发送请求\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"先进行tcp连接\"\u003e先进行TCP连接\u003c/h2\u003e\n\u003cp\u003egolang实现(\u003cem\u003e这里的地址我是本地socks5服务端\u003c/em\u003e)\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-go\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003econn, err \u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e:=\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e net.\u003c/span\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003eDial\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e(\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e\"tcp\"\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e, \u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e\"127.0.0.1:1080\"\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003eif\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e err \u003c/span\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e!=\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e nil\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e {\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e\tfmt.\u003c/span\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003ePrintln\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e(err)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#D73A49;--shiki-dark:#F97583\"\u003e\treturn\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e}\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"向socks5服务端发送验证\"\u003e向socks5服务端发送验证\u003c/h2\u003e\n\u003cp\u003e验证字段:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth style=\"text-align:center\"\u003eVER\u003c/th\u003e\n\u003cth style=\"text-align:center\"\u003eNMETHODS\u003c/th\u003e\n\u003cth style=\"text-align:center\"\u003eMETHODS\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd style=\"text-align:center\"\u003e1字节\u003c/td\u003e\n\u003ctd style=\"text-align:center\"\u003e1字节\u003c/td\u003e\n\u003ctd style=\"text-align:center\"\u003e1-255字节\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eVER是SOCKS版本，这里应该是0x05；\u003c/li\u003e\n\u003c/ul\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"c7816edc","wip":false,"comments":true,"math":false,"mermaid":false}],"totalPages":1,"totalPosts":9}</script><script type="module" src="/assets/index-AvuwV2oc.js"></script></body></html>
