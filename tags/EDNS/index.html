nk":"64e69c3e","title":"深度学习之感知器的实现","date":"2019-03-08 22:18:41","updated":"2019-03-08 22:18:41","tags":["python"],"categories":["Machine Learning"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"感知器的一个公式:\n  **当 wx+b>0 , f(x)=1,否则f(x)=0**\n- x输入的向量  \n- w:是权重  \n- w*x是点积  \n- b是偏置(与权重类似,偏置可以认为是激励函数的偏移量，或者给神经元一个基础活跃等级。)  \n\n对权重的调整公式,此处使用了梯度下降的方法: **w=w+i\\*(t-count)\\*x**  \n- i是一个常数,i越小感知器学习越精确,当然耗费时间也最长  \n- t:本应该得到的值  \n- count:实际计算得到的值  \n- x:同上  \n\n对偏置调整的公式: **b=b+i*(t-count)**\n\n这次我们使用python来实现与和或","excerptHtml":"\u003cp>感知器的一个公式:\u003cbr>\n\u003cstrong>当 wx+b&gt;0 , f(x)=1,否则f(x)=0\u003c/strong>\u003c/p>\n\u003cul>\n\u003cli>x输入的向量\u003c/li>\n\u003cli>w:是权重\u003c/li>\n\u003cli>w*x是点积\u003c/li>\n\u003cli>b是偏置(与权重类似,偏置可以认为是激励函数的偏移量，或者给神经元一个基础活跃等级。)\u003c/li>\n\u003c/ul>\n\u003cp>对权重的调整公式,此处使用了梯度下降的方法: \u003cstrong>w=w+i*(t-count)*x\u003c/strong>\u003c/p>\n\u003cul>\n\u003cli>i是一个常数,i越小感知器学习越精确,当然耗费时间也最长\u003c/li>\n\u003cli>t:本应该得到的值\u003c/li>\n\u003cli>count:实际计算得到的值\u003c/li>\n\u003cli>x:同上\u003c/li>\n\u003c/ul>\n\u003cp>对偏置调整的公式: \u003cem>\u003cem>b=b+i\u003c/em>(t-count)\u003c/em>*\u003c/p>\n\u003cp>这次我们使用python来实现与和或\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"64e69c3e","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/golang socks5⁄http server.md","route":"/posts/c7816edc/","abbrlink":"c7816edc","title":"golang socks5/http proxy","date":"2019-03-06 20:02:47","updated":"2020-05-30 00:00:00","tags":["socks5","golang"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"完整实现代码:  \n[socks5 client](https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/client/socks5client.go)  \n[socks5 server](https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/server/server.go)  \n[http server](https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/http/server/server.go)  \n\n此处已socks5client为例,大致流程都相同,只是协议不同:  \n\nsocks5运行流程如下:\n\ntcp:\n    - 本机和代理服务端协商和建立连接；\n    - 本机告诉代理服务端目标服务的地址；\n    - 代理服务端去连接目标服务，成功后告诉本机；\n    - 本机开始发送原本应发送到目标服务的数据给代理服务端，由代理服务端完成数据转发。\nudp:\n    - udp因为是无连接的,所以所以数据一次只用一个udp包\n    - socks5是通过tcp先确认socks5 server支持udp,然后再通过udp发送请求\n\n## 先进行TCP连接\n\ngolang实现(_这里的地址我是本地socks5服务端_)\n\n```go\nconn,err := net.Dial(\"tcp\",\"127.0.0.1:1080\")\nif err != nil{\n    fmt.Println(err)\n    return\n}\n```\n\n## 向socks5服务端发送验证\n\n验证字段:\n\n|VER|NMETHODS|METHODS|\n|:-:|:-:|:-:|\n|1字节|1字节|1-255字节|\n\n- VER是SOCKS版本，这里应该是0x05；","excerptHtml":"\u003cp>完整实现代码:\u003cbr>\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/client/socks5client.go\">socks5 client\u003c/a>\u003cbr>\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/socks5/server/server.go\">socks5 server\u003c/a>\u003cbr>\n\u003ca href=\"https://github.com/Asutorufa/yuhaiin/blob/master/net/proxy/http/server/server.go\">http server\u003c/a>\u003c/p>\n\u003cp>此处已socks5client为例,大致流程都相同,只是协议不同:\u003c/p>\n\u003cp>socks5运行流程如下:\u003c/p>\n\u003cp>tcp:\u003cbr>\n- 本机和代理服务端协商和建立连接；\u003cbr>\n- 本机告诉代理服务端目标服务的地址；\u003cbr>\n- 代理服务端去连接目标服务，成功后告诉本机；\u003cbr>\n- 本机开始发送原本应发送到目标服务的数据给代理服务端，由代理服务端完成数据转发。\u003cbr>\nudp:\u003cbr>\n- udp因为是无连接的,所以所以数据一次只用一个udp包\u003cbr>\n- socks5是通过tcp先确认socks5 server支持udp,然后再通过udp发送请求\u003c/p>\n\u003ch2 id=\"先进行tcp连接\">先进行TCP连接\u003c/h2>\n\u003cp>golang实现(\u003cem>这里的地址我是本地socks5服务端\u003c/em>)\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-go\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">conn,err := net.Dial(\u003cspan class=\"hljs-string\">&quot;tcp&quot;\u003c/span>,\u003cspan class=\"hljs-string\">&quot;127.0.0.1:1080&quot;\u003c/span>)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-keyword\">if\u003c/span> err != \u003cspan class=\"hljs-literal\">nil\u003c/span>{\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">    fmt.Println(err)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-keyword\">return\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">5\u003c/span>\u003cspan class=\"code-line-content\">}\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003ch2 id=\"向socks5服务端发送验证\">向socks5服务端发送验证\u003c/h2>\n\u003cp>验证字段:\u003c/p>\n\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth style=\"text-align:center\">VER\u003c/th>\n\u003cth style=\"text-align:center\">NMETHODS\u003c/th>\n\u003cth style=\"text-align:center\">METHODS\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\n\u003ctr>\n\u003ctd style=\"text-align:center\">1字节\u003c/td>\n\u003ctd style=\"text-align:center\">1字节\u003c/td>\n\u003ctd style=\"text-align:center\">1-255字节\u003c/td>\n\u003c/tr>\n\u003c/tbody>\n\u003c/table>\n\u003cul>\n\u003cli>VER是SOCKS版本，这里应该是0x05；\u003c/li>\n\u003c/ul>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"先进行tcp连接","text":"先进行TCP连接","level":2},{"id":"向socks5服务端发送验证","text":"向socks5服务端发送验证","level":2},{"id":"向socks5服务端发送请求","text":"向socks5服务端发送请求","level":2},{"id":"进行数据转发","text":"进行数据转发","level":2},{"id":"关闭tcp连接","text":"关闭TCP连接","level":2},{"id":"udp","text":"UDP","level":2},{"id":"参考来源","text":"参考来源","level":2}],"slugForSearch":"c7816edc","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/安卓通过adb添加电池用户白名单.md","route":"/posts/1e63e0e/","abbrlink":"1e63e0e","title":"安卓通过adb添加电池用户白名单","date":"2019-02-02 23:15:29","updated":"2019-02-02 23:15:29","tags":["android"],"categories":["android"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"安卓6.0引入了doze来节省电量,但某些国产ui(如锤子)阉割了这个菜单,可通过adb添加  \n\n添加应用到白名单：\n\n```bash\nadb shell dumpsys deviceidle whitelist +\u003cpackage>\n```\n\n如:\n\n```bash\nadb shell dumpsys deviceidle whitelist +com.google.android.gms\n```\n\n删除白名单(把加号改成减号):","excerptHtml":"\u003cp>安卓6.0引入了doze来节省电量,但某些国产ui(如锤子)阉割了这个菜单,可通过adb添加\u003c/p>\n\u003cp>添加应用到白名单：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">adb shell dumpsys deviceidle whitelist +&lt;package&gt;\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>如:\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">adb shell dumpsys deviceidle whitelist +com.google.android.gms\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>删除白名单(把加号改成减号):\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"1e63e0e","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/安卓使用dalvikvm运行java(termux运行java).md","route":"/posts/8b98169e/","abbrlink":"8b98169e","title":"安卓使用dalvikvm运行java(termux运行java)","date":"2019-02-02 23:02:35","updated":"2019-02-02 23:02:35","tags":["android","java"],"categories":["android"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"一直想要使用termux来在安卓上写java,但termux上只有ecj可以使java编译为目标文件class,却不能使其编译为可执行文件  \n发现通过安卓自带的dalvikvm可以运行,只是步骤繁琐一些  \n\n## 安装所需工具\ntermux上安装 ecj 和 dx就可以了\n\n```bash\napt install ecj dx\n```\n\n## 编译为class文件\n\n```bash\necj XXX.java\n```","excerptHtml":"\u003cp>一直想要使用termux来在安卓上写java,但termux上只有ecj可以使java编译为目标文件class,却不能使其编译为可执行文件\u003cbr>\n发现通过安卓自带的dalvikvm可以运行,只是步骤繁琐一些\u003c/p>\n\u003ch2 id=\"安装所需工具\">安装所需工具\u003c/h2>\n\u003cp>termux上安装 ecj 和 dx就可以了\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">apt install ecj dx\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003ch2 id=\"编译为class文件\">编译为class文件\u003c/h2>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">ecj XXX.java\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"安装所需工具","text":"安装所需工具","level":2},{"id":"编译为class文件","text":"编译为class文件","level":2},{"id":"编译成dex文件","text":"编译成dex文件","level":2},{"id":"使用dalvikvm运行","text":"使用dalvikvm运行","level":2}],"slugForSearch":"8b98169e","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/用CIDR表示网段.md","route":"/posts/e2b25bb8/","abbrlink":"e2b25bb8","title":"用CIDR表示网段","date":"2019-02-02 22:34:07","updated":"2019-02-02 22:34:07","tags":["IP","CIDR"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"我们知道一般CIDR(无类别域间路由)网段的表示为:**192.168.0.0/24**这种形式\n\n## IP地址\n首先我们得知道ip地址是如何来的  \nipv4的地址是用32位二进制数表示的  \n如: 255.255.255.0 -> 11111111.11111111.11111111.00000000\n\n## 网络前缀\n**192.168.0.0/24**中的24就是网络前缀,网络前缀可转化为网络掩码,24表示网络掩码的前24位为1 \n\n## 网络掩码\n「网络掩码」又叫「子网掩码」、「地址掩码」、「子網路遮罩」（subnet mask），它是一种用来指明一个IP地址的哪些位标识的是主机所在的网络地址以及哪些位标识的是主机地址的位掩码。      --维基百科","excerptHtml":"\u003cp>我们知道一般CIDR(无类别域间路由)网段的表示为:\u003cstrong>192.168.0.0/24\u003c/strong>这种形式\u003c/p>\n\u003ch2 id=\"ip地址\">IP地址\u003c/h2>\n\u003cp>首先我们得知道ip地址是如何来的\u003cbr>\nipv4的地址是用32位二进制数表示的\u003cbr>\n如: 255.255.255.0 -&gt; 11111111.11111111.11111111.00000000\u003c/p>\n\u003ch2 id=\"网络前缀\">网络前缀\u003c/h2>\n\u003cp>\u003cstrong>192.168.0.0/24\u003c/strong>中的24就是网络前缀,网络前缀可转化为网络掩码,24表示网络掩码的前24位为1\u003c/p>\n\u003ch2 id=\"网络掩码\">网络掩码\u003c/h2>\n\u003cp>「网络掩码」又叫「子网掩码」、「地址掩码」、「子網路遮罩」（subnet mask），它是一种用来指明一个IP地址的哪些位标识的是主机所在的网络地址以及哪些位标识的是主机地址的位掩码。      --维基百科\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"ip地址","text":"IP地址","level":2},{"id":"网络前缀","text":"网络前缀","level":2},{"id":"网络掩码","text":"网络掩码","level":2},{"id":"cidr","text":"CIDR","level":2}],"slugForSearch":"e2b25bb8","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/android-dumpsys-tool.md","route":"/posts/25303996/","abbrlink":"25303996","title":"android dumpsys tool","date":"2019-02-01 00:00:02","updated":"2019-02-01 00:00:02","tags":["android","adb"],"categories":["android"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"查看dumpsys所有的子命令:\n\n```bash\ndumpsys | grep \"DUMP OF SERVICE\"\n```\n\noutput:\n\n```bash\nDUMP OF SERVICE SurfaceFlinger:\nDUMP OF SERVICE accessibility:\nDUMP OF SERVICE account:\nDUMP OF SERVICE activity:\nDUMP OF SERVICE alarm:\nDUMP OF SERVICE appwidget:\nDUMP OF SERVICE audio:\nDUMP OF SERVICE backup:\nDUMP OF SERVICE battery:\nDUMP OF SERVICE batteryinfo:\nDUMP OF SERVICE clipboard:\nDUMP OF SERVICE connectivity:\nDUMP OF SERVICE content:\nDUMP OF SERVICE cpuinfo:\nDUMP OF SERVICE device_policy:\nDUMP OF SERVICE devicestoragemon in\">id\u003c/span>: 0x6b \u003cspan class=\"hljs-built_in\">cap\u003c/span>: 0x9, Source Output, Sink Offload crtcs: 3 outputs: 7 associated providers: 1 name:modesetting\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">Provider 1: \u003cspan class=\"hljs-built_in\">id\u003c/span>: 0x41 \u003cspan class=\"hljs-built_in\">cap\u003c/span>: 0x6, Sink Output, Source Offload crtcs: 2 outputs: 0 associated providers: 1 name:OLAND @ pci:0000:01:00.0\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>To be able to render GPU-intensive applications by the more powerful discrete card use\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">xrandr --setprovideroffloadsink 1 0\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>或者\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"3b8b96de","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/python使用lxml分析网页.md","route":"/posts/77d15527/","abbrlink":"77d15527","title":"python使用lxml分析网页","date":"2018-08-07 14:47:51","updated":"2018-08-07 14:47:51","tags":["python","编程"],"categories":["python"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"首先得引入lxml\n\n```python\n#xpath为\nfrome lxml import etree\n#cssselector为\nimport lxml.html\n#cssselector使用起来简单但功能比xpath少\n```\n\ncssselector\n\n```python\ntree = lxml.html.fromstring('你获取的网页源代码文件或变量')\ncss = tree.cssselect('要选择的内容')\n\n#例如tree.cssselect('div.word-info > div.pronounces > span.word-audio')\n#选择器选择的结果为list\n\ncss.text_content()\n\n#表示选择的内容\n\ncss.attrib['要表示的标签属性']\n\n#如css.attrb[ ine-content\">css = tree.cssselect(\u003cspan class=\"hljs-string\">&#x27;要选择的内容&#x27;\u003c/span>)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">4\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\">#例如tree.cssselect(&#x27;div.word-info &gt; div.pronounces &gt; span.word-audio&#x27;)\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">5\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\">#选择器选择的结果为list\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">6\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">7\u003c/span>\u003cspan class=\"code-line-content\">css.text_content()\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">8\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">9\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\">#表示选择的内容\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">10\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria ap","excerptHtml":"\u003cp>偶尔发现snap会自动升级core且不删除旧版，在’/snap/core’ 会发现好几个版本的文件夹。 使用 删除某个版本的core，xxx是软件的rev，使用 可以查看软件的rev，其他软件也能用这个方法删除旧的版本哦。 参考：How to unmount and possibly delete old Ubuntu Core snap\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"b6b8953","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/ubuntu终端下连接wifi.md","route":"/posts/fb6d8628/","abbrlink":"fb6d8628","title":"ubuntu终端下连接wifi","date":"2018-06-23 12:24:10","updated":"2018-06-23 12:24:10","tags":["linux"],"categories":["linux"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## 首先使用rfkill查看你的wifi设备是否被停用\n\n使用命令\n\n```bash\nrfkill list\n```\n\n获得设备列表，每个都包含与之关联的索引号，从 0 开始\n查看设备是否被停用，要启用被停用的设备，请运行：\n\n```bash\nrfkill unblock \u003c索引号>\n```\n\n要启用所有设备，请运行：\n\n```bash\nrfkill unblock all\n```","excerptHtml":"\u003ch2 id=\"首先使用rfkill查看你的wifi设备是否被停用\">首先使用rfkill查看你的wifi设备是否被停用\u003c/h2>\n\u003cp>使用命令\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">rfkill list\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>获得设备列表，每个都包含与之关联的索引号，从 0 开始\u003cbr>\n查看设备是否被停用，要启用被停用的设备，请运行：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">rfkill unblock &lt;索引号&gt;\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>要启用所有设备，请运行：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">rfkill unblock all\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"首先使用rfkill查看你的wifi设备是否被停用","text":"首先使用rfkill查看你的wifi设备是否被停用","level":2},{"id":"启用无线网卡","text":"启用无线网卡","level":2},{"id":"使用iwconfig命令搜索无线网","text":"使用iwconfig命令搜索无线网","level":2},{"id":"补充","text":"补充","level":2}],"slugForSearch":"fb6d8628","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/暗影精灵更改efi启动顺序.md","route":"/posts/6683eff9/","abbrlink":"6683eff9","title":"暗影精灵更改efi启动顺序","date":"2018-06-23 11:43:40","updated":"2018-06-23 11:43:40","tags":["EFI","BIOS"],"categories":["Computer"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"--2019-04-22 更新--  \n**最新版bios已经可以调整启动顺序了([图在最下面](#jump))**  \n\n-------- 之 前 -------  \n暗影精灵安装完ubuntu之后只能开机按esc+f9进入ubuntu，否则会直接启动windows,虽然可以使用但及其不方便的说\n\n首先从ubuntu进入/boot/efi/EFI\n**备份windwos的启动文件**（**切记一定要备份，否则只能从pe重新建立windwos启动项**）\n\n```bash\ncp -arf Microsoft win10\n```\n\n将ubuntu的grubx64.efi替换掉EFI/Microsoft/Boot/bootmgfw.efi文件","excerptHtml":"\u003cp>–2019-04-22 更新–\u003cbr>\n\u003cstrong>最新版bios已经可以调整启动顺序了(\u003ca href=\"#jump\">图在最下面\u003c/a>)\u003c/strong>\u003c/p>\n\u003cp>-------- 之 前 -------\u003cbr>\n暗影精灵安装完ubuntu之后只能开机按esc+f9进入ubuntu，否则会直接启动windows,虽然可以使用但及其不方便的说\u003c/p>\n\u003cp>首先从ubuntu进入/boot/efi/EFI\u003cbr>\n\u003cstrong>备份windwos的启动文件\u003c/strong>（\u003cstrong>切记一定要备份，否则只能从pe重新建立windwos启动项\u003c/strong>）\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-built_in\">cp\u003c/span> -arf Microsoft win10\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>将ubuntu的grubx64.efi替换掉EFI/Microsoft/Boot/bootmgfw.efi文件\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"6683eff9","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/関西弁コレクション.md","route":"/posts/a4241e7/","abbrlink":"a4241e7","title":"関西弁コレクション","date":"2018-06-21 09:42:02","updated":"2025-09-06 09:42:02","tags":["関西弁"],"categories":["日本語"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"普段発見の関西弁ここで記録します。\n\n--**2025年9月6日**--\n\nほな\n\n大阪弁の「ほな」は、「それでは」「では」「それじゃあ」「じゃあ」といった意味で、接続詞としても、別れ際の挨拶としても使われます。また、前後の文脈によって「それなら」といった意味で使われることもあり、非常に汎用性の高い言葉です。\n\n***\n\nしばく\n\n「しばく」には、物を棒などで強く叩くという意味と、大阪弁で軽い飲食や遊びに行くことを指す用法があります。前者は文字通り暴力的な意味合いですが、後者は「茶しばく」（お茶する）のように、親しい間柄での軽い誘いや日常的な表現として使われ、本気で殴るつもりはありません。\n\n***\n\n--**2020年1月30日**--  \n おらん とはどういう意味ですか?\n >文からするとその方は関西の人ですかね。おらんは方言で、「いない」という意味です。\n >例文：_俺も一緒やな 3年ぐらいはおらん。_\n\n--**2019年2月1日**--\n***\n①関西弁の～ねんけど、～やねん、～ねんの意味を教えて下さい  \n②～ねやは～ですかの意味ですか？それ意外に意味、使い方等は有りますか？  \n③言葉の関西弁のアクセントを教えて下さい  \n\n①・・・  \n～ねんけど ですけれど（〇〇なんですけれど）\n～やねん、～ねん です（〇〇なんです）\n\n②・・・  \n～ねやは～（～やねん”わ”～ですね。）\n〇○なんですよ。\n\n③・・・  \n～ねんけど（中中）\n～やねん（高低）\n～やねんわ～（高低中）","excerptHtml":"\u003cp>普段発見の関西弁ここで記録します。\u003c/p>\n\u003cp>–\u003cstrong>2025年9月6日\u003c/strong>–\u003c/p>\n\u003cp>ほな\u003c/p>\n\u003cp>大阪弁の「ほな」は、「それでは」「では」「それじゃあ」「じゃあ」といった意味で、接続詞としても、別れ際の挨拶としても使われます。また、前後の文脈によって「それなら」といった意味で使われることもあり、非常に汎用性の高い言葉です。\u003c/p>\n\u003chr>\n\u003cp>しばく\u003c/p>\n\u003cp>「しばく」には、物を棒などで強く叩くという意味と、大阪弁で軽い飲食や遊びに行くことを指す用法があります。前者は文字通り暴力的な意味合いですが、後者は「茶しばく」（お茶する）のように、親しい間柄での軽い誘いや日常的な表現として使われ、本気で殴るつもりはありません。\u003c/p>\n\u003chr>\n\u003cp>–\u003cstrong>2020年1月30日\u003c/strong>–\u003cbr>\nおらん とはどういう意味ですか?\u003c/p>\n\u003cblockquote>\n\u003cp>文からするとその方は関西の人ですかね。おらんは方言で、「いない」という意味です。\u003cbr>\n例文：\u003cem>俺も一緒やな 3年ぐらいはおらん。\u003c/em>\u003c/p>\n\u003c/blockquote>\n\u003cp>–\u003cstrong>2019年2月1日\u003c/strong>–\u003c/p>\n\u003chr>\n\u003cp>①関西弁の～ねんけど、～やねん、～ねんの意味を教えて下さい\u003cbr>\n②～ねやは～ですかの意味ですか？それ意外に意味、使い方等は有りますか？\u003cbr>\n③言葉の関西弁のアクセントを教えて下さい\u003c/p>\n\u003cp>①・・・\u003cbr>\n～ねんけど ですけれど（〇〇なんですけれど）\u003cbr>\n～やねん、～ねん です（〇〇なんです）\u003c/p>\n\u003cp>②・・・\u003cbr>\n～ねやは～（～やねん”わ”～ですね。）\u003cbr>\n〇○なんですよ。\u003c/p>\n\u003cp>③・・・\u003cbr>\n～ねんけど（中中）\u003cbr>\n～やねん（高低）\u003cbr>\n～やねんわ～（高低中）\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"a4241e7","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/JavaScript对字符串操作.md","route":"/posts/86cfa6a/","abbrlink":"86cfa6a","title":"JavaScript对字符串操作","date":"2018-03-24 23:17:58","updated":"2018-09-04 23:17:58","tags":["JavaScript","前端"],"categories":["JavaScript"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"86cfa6a","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/让win10的UWP应用走代理.md","route":"/posts/d22ffdb6/","abbrlink":"d22ffdb6","title":"让win10的UWP应用走代理","date":"2018-02-08 15:09:16","updated":"2020-03-01 15:09:16","tags":["proxy"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## 原因\n\n因为uwp应用的特殊性,即使使用proxifier和proxycap这种应用也无法让其走代理\n\n## 现在可直接用WindowsLoopbackManager\n\n[WindowsLoopbackManager](https://github.com/tiagonmas/Windows-Loopback-Exemption-Manager)","excerptHtml":"\u003ch2 id=\"原因\">原因\u003c/h2>\n\u003cp>因为uwp应用的特殊性,即使使用proxifier和proxycap这种应用也无法让其走代理\u003c/p>\n\u003ch2 id=\"现在可直接用windowsloopbackmanager\">现在可直接用WindowsLoopbackManager\u003c/h2>\n\u003cp>\u003ca href=\"https://github.com/tiagonmas/Windows-Loopback-Exemption-Manager\">WindowsLoopbackManager\u003c/a>\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"原因","text":"原因","level":2},{"id":"现在可直接用windowsloopbackmanager","te /code>\u003c/pre>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"854ed6ec","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/利用结构体让函数返回多个值.md","route":"/posts/c69434f1/","abbrlink":"c69434f1","title":"利用结构体让函数返回多个值","date":"2017-11-29 14:39:27","updated":"2017-11-29 14:39:27","tags":["C","C++"],"categories":["Program"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## c语言\n\n```c\n#include \"stdio.h\"\ntypedef struct test //建立结构体\n{\n int a;\n int b;\n int c;\n}T;\n\nT testt(int aa,int bb,int cc) //建立函数\n{\n T aaa;\n aaa.a=aa*bb;\n aaa.b=aa*cc;\n aaa.c=bb*cc;\n return aaa; //返回结构\n}\n\nint main()\n{\n T b=testt(4,5,6);\n printf(\"%d %d %d \\n\",b.a,b.b,b.c);\n T *f=&b;\n printf(\"%d %d %d\",f->a,f->b,f->c);\n}\n```\n\n## C++","excerptHtml":"\u003ch2 id=\"c语言\">c语言\u003c/h2>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-c\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-meta\">#\u003cspan class=\"hljs-keyword\">include\u003c/span> \u003cspan class=\"hljs-string\">&quot;stdio.h&quot;\u003c/span>\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-keyword\">typedef\u003c/span> \u003cspan class=\"hljs-class\">\u003cspan class=\"hljs-keyword\">struct\u003c/span> \u003cspan class=\"hljs-title\">test\u003c/span> //建立结构体\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\">{\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan
