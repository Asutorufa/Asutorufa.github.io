  <script>window.__BLOG_DATA__={"content":{"config":{"title":"Asutorufaのブログ","subtitle":"こんにちは","description":"","author":"Asutorufa","url":"https://asutorufa.com","perPage":10},"posts":[{"kind":"post","sourcePath":"source/_posts/QdrantでHybrid-Search.md","route":"/posts/1755854433972/","abbrlink":"1755854433972","title":"QdrantでHybrid Search","date":"2025-08-22 17:20:33","updated":"2025-08-22 17:20:33","tags":["llm","rag","text embedding","sparse vector","vector database","hybrid search"],"categories":["llm"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"密ベクトルは現在ではText Embeddingサービスや`vllm`などを使えば簡単に生成をてきる。  \n疎ベクトルは色々と探しましたが、直接利用できるサービスがあまりはない、自分で用意しなければならない。\n`Qdrant`が提供する`fastembed`は利用できますけど、対応している疎ベクトルモデルが少ないため、最後的に`sentence_transformers`の`SparseEncoder`を利用することにしました。\n\n例えば、以下のようなドキュメントがあるとします：\n\n```python\ndocx = [\n    \"test1\",\n    \"test2\",\n    \"test3\",\n    \"test4\",\n]\n```\n\n戻り値の形式がわかりにくく、少し混乱しました：\n\n```python\ndocument_embeddings.coalesce().indices().cpu().numpy() = \n    [[ 0 0 0 0 1 1 1 2 2 2 3 3 ] [ 5 25 29 56 4035 4038 4059 1 2 3 98 67 54]]\n\ndocument_embeddings.coalesce().values().cpu().numpy() = \n    [0.03429046 0.02966345 0.03258647 0.03258648 0.03258649 0.03137818 0.0306967 0.04750843 0.0475084 0.0475085 0.03258612 0.03137328]\n```\n\nQdrant疎ベクトル形式の引数要求は以下のようになります：\n\n```python\nindices = [ 5   25   29 ... ]\nvalues =  [ 0.03429046 0.02966345 0.03258647 ... ]\n```\n\n最後はなんとかわかりました、実は：\n\n- `indices`の1次元目が `0` の要素が、`docs[0]` (\"test1\") に対応します。\n- `indices`の1次元目が `1` の要素が、`docs[1]` (\"test2\") に対応します。\n- ...\n\nしたがって、疎ベクトルは以下のようになります。","excerptHtml":"\u003cp>密ベクトルは現在ではText Embeddingサービスや\u003ccode>vllm\u003c/code>などを使えば簡単に生成をてきる。\u003cbr>\n疎ベクトルは色々と探しましたが、直接利用できるサービスがあまりはない、自分で用意しなければならない。\u003cbr>\n\u003ccode>Qdrant\u003c/code>が提供する\u003ccode>fastembed\u003c/code>は利用できますけど、対応している疎ベクトルモデルが少ないため、最後的に\u003ccode>sentence_transformers\u003c/code>の\u003ccode>SparseEncoder\u003c/code>を利用することにしました。\u003c/p>\n\u003cp>例えば、以下のようなドキュメントがあるとします：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-python\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">docx = [\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-string\">&quot;test1&quot;\u003c/span>,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-string\">&quot;test2&quot;\u003c/span>,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-string\">&quot;test3&quot;\u003c/span>,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">5\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-string\">&quot;test4&quot;\u003c/span>,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">6\u003c/span>\u003cspan class=\"code-line-content\">]\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>戻り値の形式がわかりにくく、少し混乱しました：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-python\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">document_embeddings.coalesce().indices().cpu().numpy() = \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003c r\">0.03429046\u003c/span> \u003cspan class=\"hljs-number\">0.02966345\u003c/span> \u003cspan class=\"hljs-number\">0.03258647\u003c/span> \u003cspan class=\"hljs-number\">0.03258648\u003c/span> \u003cspan class=\"hljs-number\">0.03258649\u003c/span> \u003cspan class=\"hljs-number\">0.03137818\u003c/span> \u003cspan class=\"hljs-number\">0.0306967\u003c/span> \u003cspan class=\"hljs-number\">0.04750843\u003c/span> \u003cspan class=\"hljs-number\">0.0475084\u003c/span> \u003cspan class=\"hljs-number\">0.0475085\u003c/span> \u003cspan class=\"hljs-number\">0.03258612\u003c/span> \u003cspan class=\"hljs-number\">0.03137328\u003c/span>]\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>Qdrant疎ベクトル形式の引数要求は以下のようになります：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-python\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">indices = [ \u003cspan class=\"hljs-number\">5\u003c/span>   \u003cspan class=\"hljs-number\">25\u003c/span>   \u003cspan class=\"hljs-number\">29\u003c/span> ... ]\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">values =  [ \u003cspan class=\"hljs-number\">0.03429046\u003c/span> \u003cspan class=\"hljs-number\">0.02966345\u003c/span> \u003cspan class=\"hljs-number\">0.03258647\u003c/span> ... ]\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>最後はなんとかわかりました、実は：\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>indices\u003c/code>の1次元目が \u003ccode>0\u003c/code> の要素が、\u003ccode>docs[0]\u003c/code> (“test1”) に対応します。\u003c/li>\n\u003cli>\u003ccode>indices\u003c/code>の1次元目が \u003ccode>1\u003c/code> の要素が、\u003ccode>docs[1]\u003c/code> (“test2”) に対応します。\u003c/li>\n\u003cli>…\u003c/li>\n\u003c/ul>\n\u003cp>したがって、疎ベクトルは以下のようになります。\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"1755854433972","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/RustでTelegram-BotをLambdaにデプロイする/doc.md","route":"/posts/1754556687621/","abbrlink":"1754556687621","title":"RustでTelegram BotをLambdaにデプロイする","date":"2025-08-07 16:51:27","updated":"2025-08-07 16:51:27","tags":["Telegram","Telegram Bot","Rust","Cargo","Teloxide","Lambda"],"categories":["Rust","Lambda","Telegram"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"Telegram BotにはサーバーとWebhookの二つの立ち上げる方法があります。Lambdaはサーバーレスだから、今回はWebhookで使用します。\n\n最初はCargoで新たなプロジェクトを作ります。\n\n```shell\ncargo new telegram-bot\n```\n\n必要な依存を追加します。\n\n```shell\ncrgo add aws_lambda_events base64 lambda_runtime serde_json serde teloxide-macros tokio teloxide cargo-lambda\n```\n\nzigをインストール\n\n```shell\n# macos\nbrew install zig\n# lambda cliでzigのインストール方法を出力して\ncargo lambda system --install-zig\n```\n\nTelegramのコマンドを宣言します\n\n\u003c!--チェックしてください　\u003c==>　ご確認ください-->\n```rust\n#[derive(BotCommands, PartialEq, Clone, Debug)]\n// いろんなパラメータに対応しています。公式ドキュメントをチェックしてください。\n#[command(\n    rename_rule = \"lowercase\",\n    description = \"These commands are supported:\"\n)]\npub enum Command {\n    #[command(description = \"get current user id\")]\n    UserID,\n}\n```\n\nTelegramの処理関数を定義します","excerptHtml":"\u003cp>Telegram BotにはサーバーとWebhookの二つの立ち上げる方法があります。Lambdaはサーバーレスだから、今回はWebhookで使用します。\u003c/p>\n\u003cp>最初はCargoで新たなプロジェクトを作ります。\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">cargo new telegram-bot\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>必要な依存を追加します。\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">crgo add aws_lambda_events \u003cspan class=\"hljs-built_in\">base64\u003c/span> lambda_runtime serde_json serde teloxide-macros tokio teloxide cargo-lambda\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>zigをインストール\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\"># macos\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">brew install zig\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\"># lambda cliでzigのインストール方法を出力して\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">cargo lambda system --install-zig\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>Telegramのコマンドを宣言します\u003c/p>\n\u003c!--チェックしてください　\u003c==>　ご確認ください-->\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-rust\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-meta\">#[derive(BotCommands, PartialEq, Clone, Debug)]\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\">// いろんなパラメータに対応しています。公式ドキュメントをチェックしてください。\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-meta\">#[command(\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">4\u003c/span>\u003cspan class=\"code-line-content\">    rename_rule = \u003cspan class=\"hljs-string\">&quot;lowercase&quot;\u003c/span>,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">5\u003c/span>\u003cspan class=\"code-line-content\">    description = \u003cspan class=\"hljs-string\">&quot;These commands are supported:&quot;\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">6\u003c/span>\u003cspan class=\"code-line-content\">)]\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">7\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-keyword\">pub\u003c/span> \u003cspan class=\"hljs-keyword\">enum\u003c/span> \u003cspan class=\"hljs-title class_\">Command\u003c/span> {\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">8\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-meta\">#[command(description = \u003cspan class=\"hljs-string\">&quot;get current user id&quot;\u003c/span>)]\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">9\u003c/span>\u003cspan class=\"code-line-content\">    UserID,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">10\u003c/span>\u003cspan class=\"code-line-content\">}\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>Telegramの処理関数を定義します\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"1754556687621","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/告别小米，投奔三星/doc.md","route":"/posts/1753552481855/","abbrlink":"1753552481855","title":"告别小米，投奔三星","date":"2025-07-27 01:54:41","updated":"2025-07-27 01:54:41","tags":["小米","三星","MIUI","澎湃OS","ONEUI"],"categories":["Personally"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"使用三星的一部分生态已经接近半年多了，同时为了未来的准备，渐渐把自己的一些老旧设备都换新了，没用的东西要么送人了要么卖二手，顺便记录一下目前的状态。\n\n## 为什么抛弃小米的所有设备\n\n之前买过不少的小米设备，大部分是因为小米的营销和身边人的推荐，给我一种小米价格不贵而且质量还不错的错觉。自己当时手上的数码产品都用了很多年了，也没有接触过当前其他品牌的产品，加上自己有刷机（使用国际版）的需求，索性买了小米的相关产品。先简述一下自己用过的产品的问题。\n\n- 小米平板4  \n  这个算是买的最早的小米设备了，不贵但是也花了1500块大洋（记不太清了）。主要有以下问题：\n    \n    - 管生不管养，系统从最初就是个半成品，其中只有过一次更新，之后小米就不管了，连安全更新都没有，体验很差劲。\n    - 电池损耗很快，没用多久电池就不行了，电量乱跳，显示还有百分之50电量，直接黑屏关闭。\n    - 电源键坏了，按很多遍才会有一次反应，我都是双击屏幕换新设备，很少用电源键，这都能坏？\n    - 无法正常观看高清Netflix，Prime Video，说实话平板主要就是拿来看视频的，结果连这个都不行。  \n\n  据说现在小米平板依旧是这样。。","excerptHtml":"\u003cp>使用三星的一部分生态已经接近半年多了，同时为了未来的准备，渐渐把自己的一些老旧设备都换新了，没用的东西要么送人了要么卖二手，顺便记录一下目前的状态。\u003c/p>\n\u003ch2 id=\"为什么抛弃小米的所有设备\">为什么抛弃小米的所有设备\u003c/h2>\n\u003cp>之前买过不少的小米设备，大部分是因为小米的营销和身边人的推荐，给我一种小米价格不贵而且质量还不错的错觉。自己当时手上的数码产品都用了很多年了，也没有接触过当前其他品牌的产品，加上自己有刷机（使用国际版）的需求，索性买了小米的相关产品。先简述一下自己用过的产品的问题。\u003c/p>\n\u003cul>\n\u003cli>\n\u003cp>小米平板4\u003cbr>\n这个算是买的最早的小米设备了，不贵但是也花了1500块大洋（记不太清了）。主要有以下问题：\u003c/p>\n\u003cul>\n\u003cli>管生不管养，系统从最初就是个半成品，其中只有过一次更新，之后小米就不管了，连安全更新都没有，体验很差劲。\u003c/li>\n\u003cli>电池损耗很快，没用多久电池就不行了，电量乱跳，显示还有百分之50电量，直接黑屏关闭。\u003c/li>\n\u003cli>电源键坏了，按很多遍才会有一次反应，我都是双击屏幕换新设备，很少用电源键，这都能坏？\u003c/li>\n\u003cli>无法正常观看高清Netflix，Prime Video，说实话平板主要就是拿来看视频的，结果连这个都不行。\u003c/li>\n\u003c/ul>\n\u003cp>据说现在小米平板依旧是这样。。\u003c/p>\n\u003c/li>\n\u003c/ul>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"为什么抛弃小米的所有设备","text":"为什么抛弃小米的所有设备","level":2},{"id":"为什么是三星","text":"为什么是三星","level":2}],"slugForSearch":"1753552481855","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/terraformのモジュール.md","route":"/posts/3395bae7/","abbrlink":"3395bae7","title":"terraformのモジュール","date":"2025-02-27 19:29:27","updated":"2025-02-27 19:29:27","tags":["Kubernetes","Terraform","container","インフラ"],"categories":["Kubernetes"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"**WIP**\n---\n\n```md\n- +\n  + project1 -+\n  |           +- main.tf\n  |           +- variables.tf\n  |           +- pro.tfvars\n  |           +- debug.tfvars\n  |\n  +- modules -+\n              +- module1 -+\n              |            +- main.tf\n              |            +- variables.tf\n              |            +- outputs.tf\n              |\n              +- module2 -+\n                           +- main.tf\n                           +- variables.tf\n                           +- outputs.tf\n```","excerptHtml":"\u003ch2 id=\"wip\">\u003cstrong>WIP\u003c/strong>\u003c/h2>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-bullet\">-\u003c/span> +\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-bullet\">  +\u003c/span> project1 -+\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number egories":["Kubernetes"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"## Kubernetesコントローラーとは\n\nコントローラーはKubernetesのリソース設定を監視して変更があったら自動的にリソースを調整するプログラムです。ちなみに、Deployment、Statefulset、DaemonSetなどはKubernetesの内蔵コントローラーです。\n\n## コントローラーを実現\n\n今回はGolangで簡単なLoadBalancerコントローラーを実現する。実際の機能はないですが、作成の流れはただしいと思います。\n\n最初はTypeはLoadBalancerのServiceを作成\n\n```yaml\napiVersion: v1\nkind: Service\nmetadata:\n  name: my-service\nspec:\n  selector:\n    app.kubernetes.io/name: MyApp\n  ports:\n    - protocol: TCP\n      port: 80\n      targetPort: 80\n  clusterIP: 10.0.171.239\n  type: LoadBalancer\n```\n\nこの時はIPアドレスを割り当てのコントローラーがないので、ServiceのステータスはPendingです。\n\n新たなKubernetesクライアントを作成","excerptHtml":"\u003ch2 id=\"kubernetesコントローラーとは\">Kubernetesコントローラーとは\u003c/h2>\n\u003cp>コントローラーはKubernetesのリソース設定を監視して変更があったら自動的にリソースを調整するプログラムです。ちなみに、Deployment、Statefulset、DaemonSetなどはKubernetesの内蔵コントローラーです。\u003c/p>\n\u003ch2 id=\"コントローラーを実現\">コントローラーを実現\u003c/h2>\n\u003cp>今回はGolangで簡単なLoadBalancerコントローラーを実現する。実際の機能はないですが、作成の流れはただしいと思います。\u003c/p>\n\u003cp>最初はTypeはLoadBalancerのServiceを作成\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-yaml\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-attr\">apiVersion:\u003c/span> \u003cspan class=\"hljs-string\">v1\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-attr\">kind:\u003c/span> \u003cspan class=\"hljs-string\">Service\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-attr an>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">11\u003c/span>\u003cspan class=\"code-line-content\">      \u003cspan class=\"hljs-attr\">targetPort:\u003c/span> \u003cspan class=\"hljs-number\">80\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">12\u003c/span>\u003cspan class=\"code-line-content\">  \u003cspan class=\"hljs-attr\">clusterIP:\u003c/span> \u003cspan class=\"hljs-number\">10.0\u003c/span>\u003cspan class=\"hljs-number\">.171\u003c/span>\u003cspan class=\"hljs-number\">.239\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">13\u003c/span>\u003cspan class=\"code-line-content\">  \u003cspan class=\"hljs-attr\">type:\u003c/span> \u003cspan class=\"hljs-string\">LoadBalancer\u003c/span>\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>この時はIPアドレスを割り当てのコントローラーがないので、ServiceのステータスはPendingです。\u003c/p>\n\u003cp>新たなKubernetesクライアントを作成\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"kubernetesコントローラーとは","text":"Kubernetesコントローラーとは","level":2},{"id":"コントローラーを実現","text":"コントローラーを実現","level":2}],"slugForSearch":"70902a01","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/UDPプロキシはFullcone-NATを実現する.md","route":"/posts/4893f166/","abbrlink":"4893f166","title":"UDPプロキシはFullcone NATを実現する","date":"2024-11-18 19:49:40","updated":"2024-11-18 19:49:40","tags":["Proxy","Network","UDP","NAT","Go","Golang"],"categories":["Network"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"## NATの種類\n\n### Mappingの種類  \n\nマッピングはNAT内部から外部にパケットを送信時にアドレス変換する行為です。\n\n- Endpoint-Independent Mapping\n\nNAT内部のネットワークの同じIPアドレスとポートで外部のそれぞれのUDPサーバ（IPアドレスとポートが違う）にパケットを送信すると、各個UDPサーバも同じIPアドレスとポートのパケットを受信する。  \n例えば：\n\n|送信元アドレス|宛先アドレス|NATマッピングアドレス|\n|:--:|:--:|:--:|\n|192.168.1.1:3000|1.1.1.1:3000|43.124.222.234:4500|\n|192.168.1.1:3000|1.1.1.1:__3001__|43.124.222.234:4500|\n|192.168.1.1:3000|__1.1.1.3__:__3002__|43.124.222.234:4500|\n|192.168.1.1:3000|__1.1.1.4__:__3004__|43.124.222.234:4500|\n\n\u003c!-- \n宛先　あてさき　target\n各個　かっこ\n受信　じゅしん\n且つ　かつ\n\nhttps://medium.com/google-cloud-jp/cloud-nat-endpoint-independent-mapping-39d7eab3e83c\nhttps://tech.zms.co.jp/nat%E3%81%82%E3%82%8C%E3%81%93%E3%82%8C/\n -->\n\n- Address-Dependent Mapping\n\nUDPサーバのアドレスが同じ（ポートが違う）なら受信したパケットのIPアドレスとポートを変換しない、そうしないと、IPアドレスやポートを変換する。  \n例えば：\n\n|送信元アドレス|宛先アドレス|NATマッピングアドレス|\n|:--:|:--:|:--:|\n|192.168.1.1:3000|1.1.1.1:3000|43.124.222.234:4500|\n|192.168.1.1:3000|1.1.1.1:__3001__|43.124.222.234:4500|\n|192.168.1.1:3000|__1.1.1.2__:3000|43.124.222.234:__4501__|\n|192.168.1.1:3000|__1.1.1.3__:__3003__|43.124.222.234:__4502__|\n\n- Address and Port-Dependent Mapping\n\nUDPサーバのアドレスとポートが同じなら受信したパケットのIPアドレスとポートを変換しない、そうしないと、IPアドレスやポートを変換する。","excerptHtml":"\u003ch2 id=\"natの種類\">NATの種類\u003c/h2>\n\u003ch3 id=\"mappingの種類\">Mappingの種類\u003c/h3>\n\u003cp>マッピングはNAT内部から外部にパケットを送信時にアドレス変換する行為です。\u003c/p>\n\u003cul>\n\u003cli>Endpoint-Independent Mapping\u003c/li>\n\u003c/ul>\n\u003cp>NAT内部のネットワークの同じIPアドレスとポートで外部のそれぞれのUDPサーバ（IPアドレスとポートが違う）にパケットを送信すると、各個UDPサーバも同じIPアドレスとポートのパケットを受信する。\u003cbr>\n例えば：\u003c/p>\n\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth style=\"text-align:center\">送信元アドレス\u003c/th>\n\u003cth style=\"text-align:center\">宛先アドレス\u003c/th>\n\u003cth style=\"text-align:center\">NATマッピングアドレス\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">1.1.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:4500\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">1.1.1.1:\u003cstrong>3001\u003c/strong>\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:4500\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">\u003cstrong>1.1.1.3\u003c/strong>:\u003cstrong>3002\u003c/strong>\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:4500\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">\u003cstrong>1.1.1.4\u003c/strong>:\u003cstrong>3004\u003c/strong>\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:4500\u003c/td>\n\u003c/tr>\n\u003c/tbody>\n\u003c/table>\n\u003c!-- \n宛先　あてさき　target\n各個　かっこ\n受信　じゅしん\n且つ　かつ\n\nhttps://medium.com/google-cloud-jp/cloud-nat-endpoint-independent-mapping-39d7eab3e83c\nhttps://tech.zms.co.jp/nat%E3%81%82%E3%82%8C%E3%81%93%E3%82%8C/\n -->\n\u003cul>\n\u003cli>Address-Dependent Mapping\u003c/li>\n\u003c/ul>\n\u003cp>UDPサーバのアドレスが同じ（ポートが違う）なら受信したパケットのIPアドレスとポートを変換しない、そうしないと、IPアドレスやポートを変換する。\u003cbr>\n例えば：\u003c/p>\n\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth style=\"text-align:center\">送信元アドレス\u003c/th>\n\u003cth style=\"text-align:center\">宛先アドレス\u003c/th>\n\u003cth style=\"text-align:center\">NATマッピングアドレス\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">1.1.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:4500\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">1.1.1.1:\u003cstrong>3001\u003c/strong>\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:4500\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">\u003cstrong>1.1.1.2\u003c/strong>:3000\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:\u003cstrong>4501\u003c/strong>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd style=\"text-align:center\">192.168.1.1:3000\u003c/td>\n\u003ctd style=\"text-align:center\">\u003cstrong>1.1.1.3\u003c/strong>:\u003cstrong>3003\u003c/strong>\u003c/td>\n\u003ctd style=\"text-align:center\">43.124.222.234:\u003cstrong>4502\u003c/strong>\u003c/td>\n\u003c/tr>\n\u003c/tbody>\n\u003c/table>\n\u003cul>\n\u003cli>Address and Port-Dependent Mapping\u003c/li>\n\u003c/ul>\n\u003cp>UDPサーバのアドレスとポートが同じなら受信したパケットのIPアドレスとポートを変換しない、そうしないと、IPアドレスやポートを変換する。\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"natの種類","text":"NATの種類","level":2},{"id":"mappingの種類","text":"Mappingの種類","level":3},{"id":"filteringの種類","text":"Filteringの種類","level":3},{"id":"fullcone-nat","text":"Fullcone NAT","level":3},{"id":"goで実現する","text":"goで実現する","level":2}],"slugForSearch":"4893f166","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/golangとollamaでfunction-calling.md","route":"/posts/23567986/","abbrlink":"23567986","title":"golangとollamaでfunction calling","date":"2024-11-11 19:11:06","updated":"2024-11-11 19:11:06","tags":["llm","function calling","text embedding"],"categories":["llm"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"今回はollamaのオフィシャルクライアントでfuncation callingを使いたいです。　　\n前回はlangchaingoで使っただけと、試してたらollamaの引数toolsは無効です、githubの実例[ollama_functions_example](https://github.com/tmc/langchaingo/blob/main/examples/ollama-functions-example/ollama_functions_example.go)はsystem messageとtoolsのjsonを組み合わせて内容を生成する。例えば：\n\n```go\nfunc systemMessage() string {\n bs, err := json.Marshal(functions)\n if err != nil {\n  log.Fatal(err)\n }\n\n return fmt.Sprintf(`You have access to the following tools:\n\n%s\n\nTo use a tool, respond with a JSON object with the following structure: \n{\n \"tool\": \u003cname of the called tool>,\n \"tool_inp  above JSON schema&gt;\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">15\u003c/span>\u003cspan class=\"code-line-content\">}\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">16\u003c/span>\u003cspan class=\"code-line-content\">`\u003c/span>, \u003cspan class=\"hljs-type\">string\u003c/span>(bs))\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">17\u003c/span>\u003cspan class=\"code-line-content\">}\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>これはちょっと優雅でない、\u003ccode>ollama/api\u003c/code>を使いたいと思います。\u003c/p>\n\u003ch2 id=\"function-callingとは\">function callingとは\u003c/h2>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"function-callingとは","text":"function callingとは","level":2},{"id":"goで実現","text":"goで実現","level":2},{"id":"実行","text":"実行","level":2},{"id":"参考","text":"参考","level":2}],"slugForSearch":"23567986","comments":true,"math":false,"mermaid":true},{"kind":"post","sourcePath":"source/_posts/langchaingoでRAGを試しました.md","route":"/posts/95db8f9/","abbrlink":"95db8f9","title":"langchaingoでRAGを試しました","date":"2024-11-06 10:37:12","updated":"2024-11-06 10:37:12","tags":["llm","rag","text embedding"],"categories":["llm"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"> 日本語はまだ勉強中ですから、変などころあったら、ぜひコメントしてください。\n\n## RAGとは\n\nRAGはRetrieval augmented generationの略です。  \n大規模言語モデル内容を生成する前に、promptによる外部のデーターベースに知識を検索、元のpromptと組み合わせて、アウトプットを改善するための技術です。  \n\n```mermaid\nsequenceDiagram\n    actor ユーザ\n    ユーザ->>サーバー: prompt: 今日の注目\u003cbr/>の新聞は何ですか？\n    サーバー->>ベクトルデータベース: promptをキーワードとして\u003cbr/>知識を検索\n    ベクトルデータベース--)サーバー: 知識を返す\n    サーバー->>llm: promptと知識を組み合わせて\n    llm-->>サーバー: 生成する内容を返す\n    サーバー->>ユーザ: 内容を返す\n```\n\n例えば：\n\nユーザ：今日の注目の新聞は何ですか？\n\ngemini：\n\n```txt\n今日の注目の新聞記事については、リアルタイムで変化するため、特定の新聞社名を挙げて「今日の注目の記事はこれです」と断言することは難しいです。\n```\n\nchatgpt:\n\n```txt\n本日（2024年11月6日）の日本の注目ニュースは次のような内容が含まれている可能性があります：\n\nアメリカ大統領選挙の最新動向 - 特に若い世代の投票行動や政策への関心が注目されています。\n国内経済とインフレの動き - 日本の物価高騰が続き、家計への影響や政府の対応が議論されています。\nアジアの地政学的緊張 - 日本周辺地域の安全保障に関連する動向が続いています。\n以上の内容が注目ニュースとして考えられますが、詳細については直接ニュースソースで確認されるとよいでしょう。\n```\n\ngeminiはリアルタイムによっての内容は回答できません。  \nchatgptはRAGか、Function Callingか、どちらかを使っていると思います。  \n今回はgolang+langchaingo+ollama+qdrantでRAGを実験してみます。\n\n## 準備","excerptHtml":"\u003cblockquote>\n\u003cp>日本語はまだ勉強中ですから、変などころあったら、ぜひコメントしてください。\u003c/p>\n\u003c/blockquote>\n\u003ch2 id=\"ragとは\">RAGとは\u003c/h2>\n\u003cp>RAGはRetrieval augmented generationの略です。\u003cbr>\n大規模言語モデル内容を生成する前に、promptによる外部のデーターベースに知識を検索、元のpromptと組み合わせて、アウトプットを改善するための技術です。\u003c/p>\n\u003cdiv class=\"mermaid\">sequenceDiagram\n    actor ユーザ\n    ユーザ-&gt;&gt;サーバー: prompt: 今日の注目&lt;br/&gt;の新聞は何ですか？\n    サーバー-&gt;&gt;ベクトルデータベース: promptをキーワードとして&lt;br/&gt;知識を検索\n    ベクトルデータベース--)サーバー: 知識を返す\n    サーバー-&gt;&gt;llm: promptと知識を組み合わせて\n    llm--&gt;&gt;サーバー: 生成する内容を返す\n    サーバー-&gt;&gt;ユーザ: 内容を返す\n\u003c/div>\u003cp>例えば：\u003c/p>\n\u003cp>ユーザ：今日の注目の新聞は何ですか？\u003c/p>\n\u003cp>gemini：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-txt\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">今日の注目の新聞記事については、リアルタイムで変化するため、特定の新聞社名を挙げて「今日の注目の記事はこれです」と断言することは難しいです。\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>chatgpt:\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-txt\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">本日（2024年11月6日）の日本の注目ニュースは次のような内容が含まれている可能性があります：\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">アメリカ大統領選挙の最新動向 - 特に若い世代の投票行動や政策への関心が注目されています。\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">国内経済とインフレの動き - 日本の物価高騰が続き、家計への影響や政府の対応が議論されています。\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">5\u003c/span>\u003cspan class=\"code-line-content\">アジアの地政学的緊張 - 日本周辺地域の安全保障に関連する動向が続いています。\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">6\u003c/span>\u003cspan class=\"code-line-content\">以上の内容が注目ニュースとして考えられますが、詳細については直接ニュースソースで確認されるとよいでしょう。\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>geminiはリアルタイムによっての内容は回答できません。\u003cbr>\nchatgptはRAGか、Function Callingか、どちらかを使っていると思います。\u003cbr>\n今回はgolang+langchaingo+ollama+qdrantでRAGを実験してみます。\u003c/p>\n\u003ch2 id=\"準備\">準備\u003c/h2>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"ragとは","text":"RAGとは","level":2},{"id":"準備","text":"準備","level":2},{"id":"ollamaをインストール","text":"ollamaをインストール","level":3},{"id":"qdrantのコンテナを実行","text":"qdrantのコンテナを実行","level":3},{"id":"bge-large-en-v15をollamaで実行","text":"bge-large-en-v1.5をollamaで実行","level":3},{"id":"qwen25をollamaで実行","text":"Qwen2.5をollamaで実行","level":3},{"id":"実現","text":"実現","level":2},{"id":"text-embedder","text":"text embedder","level":3},{"id":"rag","text":"RAG","level":3},{"id":"参考","text":"参考","level":2}],"slugForSearch":"95db8f9","comments":true,"math":false,"mermaid":true},{"kind":"post","sourcePath":"source/_posts/感觉日语是一种很随意的语言.md","route":"/posts/190e8188/","abbrlink":"190e8188","title":"感觉日语是一种很随意的语言","date":"2024-07-29 21:09:46","updated":"2024-07-29 21:09:46","tags":["日本語"],"categories":["日本語"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"首先推荐一个视频 [【文法「文の成分」】【10分間の国文法講座：ラーニング・ラボWeb講座】](https://www.youtube.com/watch?v=fSnh-gz3ncc&list=PLAdD6WfVVRIW-sB2MmPSUtLG6lY2_TrVy), 大概讲了日本中学（初中）考试的一些文法。\n\n## 动词活用\n\n\n相信不少中国境内的人学习动词都是 一类动词， 二类动词，三类动词， 并且老师甚至还会告诉你不要记《标准日本语》上面带ます的动词，要记字典型。  \n然后大概会告诉一类动词的活用，类似下面：\n\n\n```md\n「う」段 →「い」段 + ます\n以「う」、「つ」、「る」结尾的词 → 去掉词尾 + って\n  ...\n  ...\n```\n\n相信不少人（至少我是）会以为这是类似英文那种动词变形，过去式等这类的。  \n然而后来我发现，这完全是误人子弟啊，日本中学（初中）根本就不用这种所谓的变形，也不是说不用，只是他们不会用这种规则去活用动词。  \n\n事实上的动词活用分类：","excerptHtml":"\u003cp>首先推荐一个视频 \u003ca href=\"https://www.youtube.com/watch?v=fSnh-gz3ncc&amp;list=PLAdD6WfVVRIW-sB2MmPSUtLG6lY2_TrVy\">【文法「文の成分」】【10分間の国文法講座：ラーニング・ラボWeb講座】\u003c/a>, 大概讲了日本中学（初中）考试的一些文法。\u003c/p>\n\u003ch2 id=\"动词活用\">动词活用\u003c/h2>\n\u003cp>相信不少中国境内的人学习动词都是 一类动词， 二类动词，三类动词， 并且老师甚至还会告诉你不要记《标准日本语》上面带ます的动词，要记字典型。\u003cbr>\n然后大概会告诉一类动词的活用，类似下面：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">「う」段 →「い」段 + ます\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">以「う」、「つ」、「る」结尾的词 → 去掉词尾 + って\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">  ...\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">  ...\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>相信不少人（至少我是）会以为这是类似英文那种动词变形，过去式等这类的。\u003cbr>\n然而后来我发现，这完全是误人子弟啊，日本中学（初中）根本就不用这种所谓的变形，也不是说不用，只是他们不会用这种规则去活用动词。\u003c/p>\n\u003cp>事实上的动词活用分类：\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"动词活用","text":"动词活用","level":2},{"id":"连浊","text":"连浊","level":2},{"id":"は-と-が","text":"「は」　と　「が」","level":2}],"slugForSearch":"190e8188","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/实现一个简单的Kubernetes-controller.md","route":"/posts/edf1c330/","abbrlink":"edf1c330","title":"实现一个简单的Kubernetes controller","date":"2024-03-30 15:09:58","updated":"2024-03-30 15:09:58","tags":["Kubernetes","CRI","container"],"categories":["Kubernetes"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## controller是什么\n\n简单来说，controller就是监听kubernetes的配置/状态变化，自动对资源进行调节。比如kubernetes内置的controller有Deployment、StatefulSet、DaemonSet。\n\n## 实现controller\n\n这里我们实现一个简单的loadbalancer controller，使用kubernetes的client-go。  \n\n先创建一个新的Serivce,并且指定Type为LoadBalancer。\n\n```yaml\napiVersion: v1\nkind: Service\nmetadata:\n  name: my-service\nspec:\n  selector:\n    app.kubernetes.io/name: MyApp\n  ports:\n    - protocol: TCP\n      port: 80\n      targetPort: 80\n  clusterIP: 10.0.171.239\n  type: LoadBalancer\n```\n\n这时Service的状态还是pending,因为还没有controller为其分配IP地址。\n\n创建新的client","excerptHtml":"\u003ch2 id=\"controller是什么\">controller是什么\u003c/h2>\n\u003cp>简单来说，controller就是监听kubernetes的配置/状态变化，自动对资源进行调节。比如kubernetes内置的controller有Deployment、StatefulSet、DaemonSet。\u003c/p>\n\u003ch2 id=\"实现controller\">实现controller\u003c/h2>\n\u003cp>这里我们实现一个简单的loadbalancer controller，使用kubernetes的client-go。\u003c/p>\n\u003cp>先创建一个新的Serivce,并且指定Type为LoadBalancer。\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-yaml\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number tle":"CRI 容器运行时接口","date":"2023-03-01 14:55:45","updated":"2023-03-01 14:55:45","tags":["Kubernetes","CRI","container"],"categories":["Kubernetes"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"CRI shim cri o cri containerd rkt frakti docker (cri dockerd) container runtime gvisor kata containers","excerptHtml":"\u003cp>CRI shim cri o cri containerd rkt frakti docker (cri dockerd) container runtime gvisor kata containers\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"cri-shim","text":"CRI shim","level":2},{"id":"container-runtime","text":"container runtime","level":2}],"slugForSearch":"8144a111","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/NAT类型.md","route":"/posts/14e0ef9e/","abbrlink":"14e0ef9e","title":"NAT类型","date":"2023-02-14 10:48:24","updated":"2023-02-14 10:48:24","tags":["NAT","UDP"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## NAT Mapping\n\n描述NAT在映射网络内主机地址的行为\n\n```md\ncomputer(192.168.100.2:30086) -> NAT -> 1.1.1.1:2345\n```\n\nEndpoint-Independent Mapping\n\n网络内主机在通过同一监听udp地址向不同地址和不同端口发包时, NAT使用同一映射地址向外发包\n\n```md\n如 网络内一主机监听了一udp地址 192.168.100.2:30086\n\n此时主机向 1.0.0.1:53 发送udp包,\n             NAT使用 1.1.1.1:2345 向 1.0.0.1:53 发包\n主机又向   1.0.0.1:63 发送udp包,\n             NAT也使用 1.1.1.1:2345 向 1.0.0.1:63 发包\n主机又向   8.8.8.8:53 发送udp包,\n             NAT也使用 1.1.1.1:2345 向 8.8.8.8:53 发包\n\n这种无论目标地址和端口是什么都使用同一地址进行发包的NAT行为就是 Endpoint-Independent Mapping,\n跟没有NAT一样\n```\n\nAddress-Dependent Mapping\n\n网络内主机在通过同一监听udp地址向同一地址和不同端口发包时, NAT使用同一映射地址向外发包\n\n```md\n如 网络内一主机监听了一udp地址 192.168.100.2:30086\n\n此时主机向 1.0.0.1:53 发送udp包,\n             NAT使用 1.1.1.1:2345 向 1.0.0.1:53 发包\n主机又向   1.0.0.1:63 发送udp包,\n             NAT也将使用 1.1.1.1:2345 向 1.0.0.1:63 发包\n主机又向   8.8.8.8:53 发送udp包,\n             此时NAT将使用一新映射地址 1.1.1.1:5678 向 8.8.8.8:53 发包\n\n这种依赖目标地址但不依赖端口的NAT映射行为就是 Address-Dependent Mapping\n```","excerptHtml":"\u003ch2 id=\"nat-mapping\">NAT Mapping\u003c/h2>\n\u003cp>描述NAT在映射网络内主机地址的行为\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">computer(192.168.100.2:30086) -&gt; NAT -&gt; 1.1.1.1:2345\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>Endpoint-Independent Mapping\u003c/p>\n\u003cp>网络内主机在通过同一监听udp地址向不同地址和不同端口发包时, NAT使用同一映射地址向外发包\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">如 网络内一主机监听了一udp地址 192.168.100.2:30086\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\">此时主机向 1.0.0.1:53 发送udp包,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">4\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-code\">             NAT使用 1.1.1.1:2345 向 1.0.0.1:53 发包\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">5\u003c/span>\u003cspan class=\"code-line-content\">主机又向   1.0.0.1:63 发送udp包,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">6\u003c/span>\u003cspan class=\"code-line-content\">             NAT也使用 1.1.1.1:2345 向 1.0.0.1:63 发包\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">7\u003c/span>\u003cspan class=\"code-line-content\">主机又向   8.8.8.8:53 发送udp包,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">8\u003c/span>\u003cspan class=\"code-line-content\">             NAT也使用 1.1.1.1:2345 向 8.8.8.8:53 发包\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">9\u003c/span>\u003cspan class=\"code-line-content\">\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">10\u003c/span>\u003cspan class=\"code-line-content\">这种无论目标地址和端口是什么都使用同一地址进行发包的NAT行为就是 Endpoint-Independent Mapping,\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">11\u003c/span>\u003cspan class=\"code-line-content\">跟没有NAT一样\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>Address-Dependent Mapping\u003c/p>\n\u003cp>网络内主机在通过同一监听udp地址向同一地址和不同端口发包时, NAT使用同一映射地址向外发包\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">如 网络内一主机监听了一udp地址 192.168.100.2:30086\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-li lse,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/TUF-GAMING-B550M-PLUS-WIFI-II-lm-sensors.md","route":"/posts/fe953398/","abbrlink":"fe953398","title":"TUF GAMING B550M-PLUS WIFI II lm_sensors","date":"2022-11-11 10:17:44","updated":"2022-11-11 10:17:44","tags":[],"categories":["linux"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"the sensors not show fan and voltage it's a kernel bug now Hardware monitoring sensor nct6798d doesn't work unless acpi enforce resources=lax is enabled need wait add the motherboa","excerptHtml":"\u003cp>the sensors not show fan and voltage it’s a kernel bug now Hardware monitoring sensor nct6798d doesn’t work unless acpi enforce resources=lax is enabled need wait add the motherboa\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"temporary-measure","text":"temporary measure","level":2}],"slugForSearch":"fe953398","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/秘密共享.md","route":"/posts/ce6c7d90/","abbrlink":"ce6c7d90","title":"秘密共享","date":"2022-10-10 11:05:22","updated":"2022-10-10 11:05:22","tags":["Crypto","Shamir"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## 拉格朗日插值法\n\n对某个多项式函数，已知有给定的k + 1个取值点：`(x0,y0)...(xk,yk)`  \n假设任意两个不同的xj都互不相同，那么应用拉格朗日插值公式所得到的拉格朗日插值多项式为：  \n\n```md\nl0 = (((x-x1)(x-x2)...(x-xk))/((x0-x1)(x0-x2)...(x0-xk)))*y0\n    ...\nlk = ...\n```\n\n`f(x) = l0+l1...+lk`即可求出多项式\n\n### example\n\n```md\n已知3个点(4,10)(5,5.25)(6,1)\n\nl0 = (((x-5)(x-6))/((4-5)(4-6))) * 10\nl1 = (((x-4)(x-6))/((5-4)(5-6))) * 5.25\nl2 = (((x-4)(x-5))/((6-4)(6-5))) * 1\n\nf(x) = l0+l1+l2 = 1/4(x^2-28x+136)\n```\n\n## Shamir 秘密共享\n\n生成","excerptHtml":"\u003ch2 id=\"拉格朗日插值法\">拉格朗日插值法\u003c/h2>\n\u003cp>对某个多项式函数，已知有给定的k + 1个取值点：\u003ccode>(x0,y0)...(xk,yk)\u003c/code>\u003cbr>\n假设任意两个不同的xj都互不相同，那么应用拉格朗日插值公式所得到的拉格朗日插值多项式为：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">l0 = (((x-x1)(x-x2)...(x-xk))/((x0-x1)(x0-x2)...(x0-xk)))\u003cspan class=\"hljs-emphasis\">*y0\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">    ...\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">lk = ...\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">\u003c/span>\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>\u003ccode>f(x) = l0+l1...+lk\u003c/code>即可求出多项式\u003c/p>\n\u003ch3 id=\"example\">example\u003c/h3>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">已知3个点(4,10)(5,5.25)(6,1)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">l0 = (((x-5)(x-6))/((4-5)(4-6))) * 10\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">l1 = (((x-4)(x-6))/((5-4)(5-6))) * 5.25\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">5\u003c/span>\u003cspan class=\"code-line-content\">l2 = (((x-4)(x-5))/((6-4)(6-5))) * 1\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">6\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">7\u003c/span>\u003cspan class=\"code-line-content\">f(x) = l0+l1+l2 = 1/4(x^2-28x+136)\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003ch2 id=\"shamir-秘密共享\">Shamir 秘密共享\u003c/h2>\n\u003cp>生成\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"拉格朗日插值法","text":"拉格朗日插值法","level":2},{"id":"example","text":"example","level":3},{"id":"shamir-秘密共享","text":"Shamir 秘密共享","level":2},{"id":"eg1","text":"eg1","level":3},{"id":"eg2","text":"eg2","level":3},{"id":"中国剩余定理","text":"中国剩余定理","level":2}],"slugForSearch":"ce6c7d90","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/离散对数问题.md","route":"/posts/1f299eb2/","abbrlink":"1f299eb2","title":"离散对数问题","date":"2022-08-15 10:03:28","updated":"2022-08-15 10:03:28","tags":["Crypto","离散对数","DH密钥交换","Elgamal"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"前置知识 欧拉, 欧拉定理, 模反元素(模逆元) 可参见: [RSA加密](/posts/f1a158c9/)\n\n## 阶\n\n由欧拉定理可知，若n,a为正整数，且n,a互素（即gcd(a,n)=1），则 a^phi(n) = 1 (mod n)。  \n因此满足同余式 a^m = 1 (mod n)的**最小正整数m**存在，这个m称作a模n的阶，记作delta(n,a)。  \n\n## 原根\n\n若n,a为正整数，且n,a互质，如果 gcd(a,n)=1 且 delta(n,a) = phi(n), 则称a为模n的原根.  \n简单来说，使该式成立的d可能有很多个值，又由欧拉定理可知delta(n,a) = phi(n)一定是满足的，如果此时所有delta(n,a)的可能取值中phi(n)是最小的，那么就称a为模n的原根。\n\neg:\n\n```md\na=3, n=7\n可知 3,7互质, 所以phi(n) = 7 - 1 = 6\n可得 3^6 = 1 (mod 7)\n\n计算3^1, 3^2, 3^3, 3^4, 3^5 (mod 7) 都不等于1, 所以 6为满足 a^x = 1 (mod n)的最小正整数\n\ndelta(7,3) = 6 = phi(7), 可得 3为模7的原根\n```\n\n### 性质","excerptHtml":"\u003cp>前置知识 欧拉, 欧拉定理, 模反元素(模逆元) 可参见: \u003ca href=\"/posts/f1a158c9/\">RSA加密\u003c/a>\u003c/p>\n\u003ch2 id=\"阶\">阶\u003c/h2>\n\u003cp>由欧拉定理可知，若n,a为正整数，且n,a互素（即gcd(a,n)=1），则 a^phi(n) = 1 (mod n)。\u003cbr>\n因此满足同余式 a^m = 1 (mod n)的\u003cstrong>最小正整数m\u003c/strong>存在，这个m称作a模n的阶，记作delta(n,a)。\u003c/p>\n\u003ch2 id=\"原根\">原根\u003c/h2>\n\u003cp>若n,a为正整数，且n,a互质，如果 gcd(a,n)=1 且 delta(n,a) = phi(n), 则称a为模n的原根.\u003cbr>\n简单来说，使该式成立的d可能有很多个值，又由欧拉定理可知delta(n,a) = phi(n)一定是满足的，如果此时所有delta(n,a)的可能取值中phi(n)是最小的，那么就称a为模n的原根。\u003c/p>\n\u003cp>eg:\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-markdown\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">a=3, n=7\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">可知 3,7互质, 所以phi(n) = 7 - 1 = 6\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">可得 3^6 = 1 (mod 7)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">5\u003c/span>\u003cspan class=\"code-line-content\">计算3^1, 3^2, 3^3, 3^4, 3^5 (mod 7) 都不等于1, 所以 6为满足 a^x = 1 (mod n)的最小正整数\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">6\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">7\u003c/span>\u003cspan class=\"code-line-content\">delta(7,3) = 6 = phi(7), 可得 3为模7的原根\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003ch3 id=\"性质\">性质\u003c/h3>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"阶","text":"阶","level":2},{"id":"原根","text":"原根","level":2},{"id":"性质","text":"性质","level":3},{"id":"离散对数","text":"离散对数","level":2},{"id":"应用","text":"应用","level":2}],"slugForSearch":"1f299eb2","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/加密模式.md","route":"/posts/903c04f7/","abbrlink":"903c04f7","title":"加密模式","date":"2022-08-14 22:09:15","updated":"2022-08-14 22:09:15","tags":["Crypto","AEAD","流密码","块密码","chacha20-poly1305"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## 流密码\n\n密码学中，流密码（英語：Stream cipher），又譯為串流加密、資料流加密，是一种对称加密算法，加密和解密双方使用相同伪随机加密数据流（pseudo-random stream）作为密钥，明文数据每次与密钥数据流顺次对应加密，得到密文数据流。实践中数据通常是一个位（bit）并用异或（xor）操作加密。\n\n\u003chttps://zh.wikipedia.org/wiki/%E6%B5%81%E5%AF%86%E7%A0%81>\n\n- chacha20/salsa20\n- rc4\n\n## 块密码/分组密码\n\n块密码只能对确定长度的数据块进行处理, 如aes每个块的大小必须为16, 如果不满16就需要进行padding\n\n### 加密模式\n\n#### ECB\n\n最简单的加密模式即为电子密码本（Electronic codebook，ECB）模式。需要加密的消息按照块密码的块大小被分为数个块，并对每个块进行独立加密。\n\n#### CBC\n\n在CBC模式中，每个明文块先与前一个密文块进行异或后，再进行加密。在这种方法中，每个密文块都依赖于它前面的所有明文块。同时，为了保证每条消息的唯一性，在第一个块中需要使用初始化向量。\n\n#### PCBC\n\n填充密码块链接（PCBC，Propagating cipher-block chaining）或称为明文密码块链接（Plaintext cipher-block chaining），是一种可以使密文中的微小更改在解密时导致明文大部分错误的模式，并在加密的时候也具有同样的特性。","excerptHtml":"\u003ch2 id=\"流密码\">流密码\u003c/h2>\n\u003cp>密码学中，流密码（英語：Stream cipher），又譯為串流加密、資料流加密，是一种对称加密算法，加密和解密双方使用相同伪随机加密数据流（pseudo-random stream）作为密钥，明文数据每次与密钥数据流顺次对应加密，得到密文数据流。实践中数据通常是一个位（bit）并用异或（xor）操作加密。\u003c/p>\n\u003cp>\u003ca href=\"https://zh.wikipedia.org/wiki/%E6%B5%81%E5%AF%86%E7%A0%81\">https://zh.wikipedia.org/wiki/流密码\u003c/a>\u003c/p>\n\u003cul>\n\u003cli>chacha20/salsa20\u003c/li>\n\u003cli>rc4\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"块密码分组密码\">块密码/分组密码\u003c/h2>\n\u003cp>块密码只能对确定长度的数据块进行处理, 如aes每个块的大小必须为16, 如果不满16就需要进行padding\u003c/p>\n\u003ch3 id=\"加密模式\">加密模式\u003c/h3>\n\u003ch4>ECB\u003c/h4>\n\u003cp>最简单的加密模式即为电子密码本（Electronic codebook，ECB）模式。需要加密的消息按照块密码的块大小被分为数个块，并对每个块进行独立加密。\u003c/p>\n\u003ch4>CBC\u003c/h4>\n\u003cp>在CBC模式中，每个明文块先与前一个密文块进行异或后，再进行加密。在这种方法中，每个密文块都依赖于它前面的所有明文块。同时，为了保证每条消息的唯一性，在第一个块中需要使用初始化向量。\u003c/p>\n\u003ch4>PCBC\u003c/h4>\n\u003cp>填充密码块链接（PCBC，Propagating cipher-block chaining）或称为明文密码块链接（Plaintext cipher-block chaining），是一种可以使密文中的微小更改在解密时导致明文大部分错误的模式，并在加密的时候也具有同样的特性。\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"流密码","text":"流密码","level":2},{"id":"块密码分组密码","text":"块密码/分组密码","level":2},{"id":"加密模式","text":"加密模式","level":3},{"id":"认证加密ae","text":"认证加密(AE)","level":2},{"id":"传统认证加密","text":"传统认证加密","level":3},{"id":"aead带有关联数据的认证加密","text":"AEAD(带有关联数据的认证加密)","level":3}],"slugForSearch":"903c04f7","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/TUN网卡.md","route":"/posts/a67af13f/","abbrlink":"a67af13f","title":"TUN网卡","date":"2022-08-14 21:46:33","updated":"2022-08-14 21:46:33","tags":["Golang","Tun","Kotlin"],"categories":["Network"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"Golang Tun (gVisor) 完整代码: tun Android VPN Service Android 的VPN Service只能处理Tun接口 完整代码: VpnService","excerptHtml":"\u003cp>Golang Tun (gVisor) 完整代码: tun Android VPN Service Android 的VPN Service只能处理Tun接口 完整代码: VpnService\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"golang-tun-gvisor","text":"Golang Tun (gVisor)","level":2},{"id":"android-vpn-service","text":"Android VPN Service","level":2}],"slugForSearch":"a67af13f","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/RSA加密.md","route":"/posts/f1a158c9/","abbrlink":"f1a158c9","title":"RSA加密","date":"2022-08-14 21:46:24","updated":"2022-08-14 21:46:24","tags":["Crypto","RSA"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"## 质数\n\n质数（Prime number），又称素数，指在大于1的自然数中，除了1和该数自身外，无法被其他自然数整除的数（也可定义为只有1与该数本身两个正因数的数）。  \n  \n来自 \u003chttps://zh.wikipedia.org/wiki/%E8%B4%A8%E6%95%B0>  \n\n### 互质\n\n互质是公约数只有1的两个整数，也可记gcd(a,b)=1, 叫做互质整数。\n\n## 欧拉\n\n在数论中，对正整数n，欧拉函数phi(n)是小于等于n的正整数中与n互质的数的数目。此函数以其首名研究者欧拉命名，它又称为φ函数（由高斯所命名）或是欧拉总计函数（totient function，由西尔维斯特所命名）。  \n  \n来自 \u003chttps://zh.wikipedia.org/wiki/%E6%AC%A7%E6%8B%89%E5%87%BD%E6%95%B0>","excerptHtml":"\u003ch2 id=\"质数\">质数\u003c/h2>\n\u003cp>质数（Prime number），又称素数，指在大于1的自然数中，除了1和该数自身外，无法被其他自然数整除的数（也可定义为只有1与该数本身两个正因数的数）。\u003c/p>\n\u003cp>来自 \u003ca href=\"https://zh.wikipedia.org/wiki/%E8%B4%A8%E6%95%B0\">https://zh.wikipedia.org/wiki/质数\u003c/a>\u003c/p>\n\u003ch3 id=\"互质\">互质\u003c/h3>\n\u003cp>互质是公约数只有1的两个整数，也可记gcd(a,b)=1, 叫做互质整数。\u003c/p>\n\u003ch2 id=\"欧拉\">欧拉\u003c/h2>\n\u003cp>在数论中，对正整数n，欧拉函数phi(n)是小于等于n的正整数中与n互质的数的数目。此函数以其首名研究者欧拉命名，它又称为φ函数（由高斯所命名）或是欧拉总计函数（totient function，由西尔维斯特所命名）。\u003c/p>\n\u003cp>来自 \u003ca href=\"https://zh.wikipedia.org/wiki/%E6%AC%A7%E6%8B%89%E5%87%BD%E6%95%B0\">https://zh.wikipedia.org/wiki/欧拉函数\u003c/a>\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"质数","text":"质数","level":2},{"id":"互质","text":"互质","level":3},{"id":"欧拉","text":"欧拉","level":2},{"id":"欧几里得算法","text":"欧几里得算法","level":2},{"id":"模反元素","text":"模反元素","level":2},{"id":"拓展欧几里得算法","text":"拓展欧几里得算法","level":3},{"id":"欧拉定理","text":"欧拉定理","level":3},{"id":"rsa","text":"RSA","level":2}],"slugForSearch":"f1a158c9","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/为广告而生-从使用到干掉大陆版MIUI.md","route":"/posts/6c3a98b5/","abbrlink":"6c3a98b5","title":"为广告而生,从使用到干掉大陆版MIUI","date":"2021-09-25 11:40:35","updated":"2021-09-25 11:40:35","tags":["小米","刷机","广告","MIUI","系统","解锁"],"categories":["Personally"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"使用四年多的锤子手机越来越不堪重负，我决定换一款新的手机，在精心挑选后，选定了今年年初发布的一款Red MI手机，其极高的性价比打动了我。\n\n## 使用\n\n在收货当天就迫不及待下班回家开始把玩，有一个词可以形容我当时的体验：軽い。  \n换手机的契机也是如此，国产app越来越毒瘤，旧手机越来越卡，开启健康码和支付宝都要至少等待2秒。由于四年的落差，即使是一款性价比手机也让我觉得好流畅，还有120hz屏幕，令我爱不释手。  \n\n## 忍受\n\n我知道MIUI是有广告的，但根据各种网上的说法，是有开关是可以关闭的。  \n所以我一入手就根据网上流传的各种方法将隐藏在系统不同角落的广告关闭了。  \n确实有效，APP和系统设置中的一些广告确实没有了，天真的我以为真的干掉了广告。  \n但是不定时广告推送，小米商城推送各种促销，系统自带浏览器也开始充当新闻客户端，各种推送傻逼新闻，而这一切的前提都是在我进入软件关闭各种推送的条件下，在了解后得知可以使用ADB冻结几个系统软件解决，我冻结了以下系统软件：\n\n```shell\nadb shell pm disable-user com.xiaomi.ab\nadb shell pm disable-user com.miui.systemAdSolution\nadb shell pm disable-user com.miui.analytics\nadb shell pm disable-user com.sohu.inputmethod.sogou.xiaomi\n```\n\n确实有效，而且连某些app的开屏广告都没了。\n\n## 愤怒","excerptHtml":"\u003cp>使用四年多的锤子手机越来越不堪重负，我决定换一款新的手机，在精心挑选后，选定了今年年初发布的一款Red MI手机，其极高的性价比打动了我。\u003c/p>\n\u003ch2 id=\"使用\">使用\u003c/h2>\n\u003cp>在收货当天就迫不及待下班回家开始把玩，有一个词可以形容我当时的体验：軽い。\u003cbr>\n换手机的契机也是如此，国产app越来越毒瘤，旧手机越来越卡，开启健康码和支付宝都要至少等待2秒。由于四年的落差，即使是一款性价比手机也让我觉得好流畅，还有120hz屏幕，令我爱不释手。\u003c/p>\n\u003ch2 id=\"忍受\">忍受\u003c/h2>\n\u003cp>我知道MIUI是有广告的，但根据各种网上的说法，是有开关是可以关闭的。\u003cbr>\n所以我一入手就根据网上流传的各种方法将隐藏在系统不同角落的广告关闭了。\u003cbr>\n确实有效，APP和系统设置中的一些广告确实没有了，天真的我以为真的干掉了广告。\u003cbr>\n但是不定时广告推送，小米商城推送各种促销，系统自带浏览器也开始充当新闻客户端，各种推送傻逼新闻，而这一切的前提都是在我进入软件关闭各种推送的条件下，在了解后得知可以使用ADB冻结几个系统软件解决，我冻结了以下系统软件：\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">adb shell pm disable-user com.xiaomi.ab\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">adb shell pm disable-user com.miui.systemAdSolution\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">adb shell pm disable-user com.miui.analytics\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">4\u003c/span>\u003cspan class=\"code-line-content\">adb shell pm disable-user com.sohu.inputmethod.sogou.xiaomi\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>确实有效，而且连某些app的开屏广告都没了。\u003c/p>\n\u003ch2 id=\"愤怒\">愤怒\u003c/h2>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"使用","text":"使用","level":2},{"id":"忍受","text":"忍受","level":2},{"id":"愤怒","text":"愤怒","level":2},{"id":"成为欧洲人","text":"成为“欧洲人”","level":2},{"id":"享受","text":"享受","level":2},{"id":"总结","text":"总结","level":2}],"slugForSearch":"6c3a98b5","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/iptables.md","route":"/posts/736b1750/","abbrlink":"736b1750","title":"iptables","date":"2021-07-14 21:31:27","updated":"2021-07-14 21:31:27","tags":["linux","iptables"],"categories":["Network"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"iptables chain iptables table: filter: nat: magle: raw: query iptables","excerptHtml":"\u003cp>iptables chain iptables table: filter: nat: magle: raw: query iptables\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"736b1750","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/HTTPS相关.md","route":"/posts/11b2b8df/","abbrlink":"11b2b8df","title":"HTTPS相关","date":"2021-04-18 18:16:58" \"\n                    }, \n                    \"Org2MSP\": {\n                        \"groups\": { }, \n                        \"mod_policy\": \"Admins\", \n                        \"values\": {\n                            \"MSP\": {\n                            }\n                        }, \n                        \"version\": \"0\"\n                    }\n                }, \n                \"version\": \"1\"\n            }, \n            \"Orderer\": {\n                \"groups\": {\n                    \"OrdererOrg\": {\n                        \"groups\": { }, \n                        \"values\": {\n                            \"MSP\": {\n                            }\n                        }, \n                        \"version\": \"0\"\n                    }\n                }, \n                \"values\": {\n                    \"ConsensusType\": {\n                        \"mod_policy\": \"Admins\", \n                        \"value\": {\n                            \"metadata\": {\n                                \"consenters\": [\n                                    {\n                                        \"client_tls_cert\": \"==\", \n                                        \"host\": \"orderer.example.com\", \n                                        \"port\": 7050, \n                                        \"server_tls_cert\": \"==\"\n                                    }\n                                ], \n                                \"options\": {\n                                    \"election_tick\": 10, \n                                    \"heartbeat_tick\": 1, \n                                    \"max_inflight_blocks\": 5, \n                                    \"snapshot_interval_size\": 16777216, \n                                    \"tick_interval\": \"500ms\"\n                                }\n                            }, \n                            \"state\": \"STATE_NORMAL\", \n                            \"type\": \"etcdraft\"\n                        }, \n                        \"version\": \"0\"\n                    }\n                }, \n                \"version\": \"0\"\n            }\n        }, \n        \"sequence\": \"2\"\n    }\n}\n```\n\n一个通道配置块类似上面这种,为了看的清楚有些内容我删了, 更换证书我们需要保证application及orderer的MSP是相同的, 否则更新配置块是不会成功的, 且我们得保证当前组织的raft节点的证书也要全部更换掉.\n\n## 失败过程","excerptHtml":"\u003ch2 id=\"前言\">前言\u003c/h2>\n\u003cp>最近一直在研究关于如何给一个fabric的组织更换一个新的证书, 包括所有加入的通道, 所有peer和orderer.\u003cbr>\n用了很多看似完美的方法却多次测试失败, 最后总算找到一种方法.\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-json\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-punctuation\">{\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\">    \u003cspan class=\"hljs-attr\">&quot;channel_group&quot;\u003c/span>\u003cspan class=\"hljs-punctuation\">:\u003c/span> \u003cspan class=\"hljs-punctuation\">{\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\">        \u003cspan class=\"hljs-attr\">&quot;groups&quot;\u003c/span>\u003cspan class=\"hljs-punctuation\">:\u003c/span> \u003cspan class=\"hljs-punctuation\">{\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">4\u003c/span>\u003cspan class=\"code-line-content\">            \u003cspan class=\"hljs-attr\">&quot;Application&quot;\u003c/span>\u003cspan class=\"hljs-punctuation\">:\u003c/span> \u003cspan class=\"hljs-punctuation\">{\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan cla de-line-content\">\u003cspan class=\"hljs-attr\">intel_iommu\u003c/span>=\u003cspan class=\"hljs-literal\">on\u003c/span> i915.enable_gvt=\u003cspan class=\"hljs-number\">1\u003c/span> i915.enable_guc=\u003cspan class=\"hljs-number\">0\u003c/span>\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003ch2 id=\"启用modules\">启用modules\u003c/h2>\n\u003cp>在\u003ccode>/etc/mkinitcpio.conf\u003c/code>的MODULES=()`中添加:\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-ini\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-comment\"># linux 5.14后，arch的linux内核模块已经不会勾选vfio-mdev，自测不影响gvt-g\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\">kvmgt vfio vfio-iommu-type1s\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>然后运行,我用的zen内核所以是linux-zen,默认内核是linux\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-built_in\">sudo\u003c/span> mkinitcpio -p linux-zen\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>重启计算机\u003c/p>\n\u003cp>查看\u003ccode>/sys/devices/pci0000:00/0000:00:02.0/mdev_supported_types\u003c/code>可以看见类似如下的目录\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"为内核添加参数","text":"为内核添加参数","level":2},{"id":"启用modules","text":"启用modules","level":2},{"id":"qemu添加钩子-启动虚拟机时自动创建虚拟显卡","text":"qemu添加钩子, 启动虚拟机时自动创建虚拟显卡","level":2},{"id":"生成虚拟机配置","text":"生成虚拟机配置","level":2},{"id":"结尾","text":"结尾","level":2}],"slugForSearch":"3a1d136","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/gpg使用.md","route":"/posts/7d547224/","abbrlink":"7d547224","title":"gpg使用","date":"2020-10-02 14:00:01","updated":"2020-10-02 14:00:01","tags":["linux","encrypt"],"categories":["linux"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"生成一个密钥\n\n```bash\ngpg --full-gen-key\n```\n\n之后会选择加密方式, 有效期, 用户名及邮箱, 密码, 按自己需求填就行了.\n\n创建一个子密钥\n\n```bash\ngpg --edit-key [key hash]\n\ngpg> addkey\n#只有与前面是相同的, 按需求选择.\n\ngpg> save\n# 保存\n```\n\n导出密钥\n\n```bash\ngpg -o /path/gpg_key --export-secret-keys [key hash]\n```\n\n导出子密钥\n\n```bash\ngpg -o /path/gpg_key.sub --export-secret-subkeys [key hash]\n```\n\n导出吊销证书\n\n```bash\ngpg --generate-revocation [key hash]\n# 输出是文本内容, 复制保存下来就行了\n```","excerptHtml":"\u003cp>生成一个密钥\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">gpg --full-gen-key\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>之后会选择加密方式, 有效期, 用户名及邮箱, 密码, 按自己需求填就行了.\u003c/p>\n\u003cp>创建一个子密钥\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-bash\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">1\u003c/span>\u003cspan class=\"code-line-content\">gpg --edit-key [key \u003cspan class=\"hljs-built_in\">hash\u003c/span>]\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">2\u003c/span>\u003cspan class=\"code-line-content\"> \u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:1\">3\u003c/span>\u003cspan class=\"code-line-content\">gpg&gt; addkey\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\ cspan class=\"code-line-content\">        0 null     null   1\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">12\u003c/span>\u003cspan class=\"code-line-content\">       / \\               / \\\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">13\u003c/span>\u003cspan class=\"code-line-content\">       0 null         null  1\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">14\u003c/span>\u003cspan class=\"code-line-content\">\u003c/span>\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003cp>trie -&gt; array\u003cbr>\nleft is 0, right is 1\u003cbr>\nvalue is index of array\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"931c13a4","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/DNS-over-HTTPS.md","route":"/posts/4b39445f/","abbrlink":"4b39445f","title":"DNS over HTTPS","date":"2020-06-23 00:30:08","updated":"2020-06-23 00:30:08","tags":["DNS","DOH","golang"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"这个DNS系列现在有以下几篇文章  \n[DNS](/posts/f05986bf/)  [EDNS](/posts/668530ca/) [DNSSEC](/posts/1751943e/) [DNS over HTTPS](/posts/4b39445f/) 完整代码请看[DNS](https://github.com/Asutorufa/yuhaiin/tree/master/net/dns)\n***\nDOH就比较简单了,因为DOH使用的请求数据和应答数据均为之前的DNS协议格式,包括DNS,EDNS,DNSSEC...当然是否支持EDNS,DNSSEC需要看DNS服务器的支持情况  \nDOH的最主要的区别是把DNS使用的UDP,换成了HTTPS,这样就能防止DNS污染了,而且可以使用DNSSEC加上ESNI来防止证书劫持,DOH的协议在[rfc8484](https://tools.ietf.org/html/rfc8484)中有定义  \nDOH主要有两种方式HTTP的GET请求和POST的请求\n\n## GET\n\nGET请求需要使用BASE64对请求的字节数据进行序列化,然后作为参数传递,获取到的数据使用我们之前的解析进行解析就行了\n\n```go\nfunc get(dReq []byte, server string) (body []byte, err error) {\n query := strings.Replace(base64.URLEncoding.EncodeToString(dReq), \"=\", \"\", -1)\n urls := \"https://\" + server + \"/dns-query?dns=\" + query\n res, err := http.Get(urls)\n if err != nil {\n  return nil, err\n }\n defer res.Body.Close()\n body, err = ioutil.ReadAll(res.Body)\n if err != nil {\n  return nil, err\n }\n return\n}\n```\n\n## POST\n\nPOST并不需要进行序列化,直接把原始请求数据作为body就行了","excerptHtml":"\u003cp>这个DNS系列现在有以下几篇文章\u003cbr>\n\u003ca href=\"/posts/f05986bf/\">DNS\u003c/a>  \u003ca href=\"/posts/668530ca/\">EDNS\u003c/a> \u003ca href=\"/posts/1751943e/\">DNSSEC\u003c/a> \u003ca href=\"/posts/4b39445f/\">DNS over HTTPS\u003c/a> 完整代码请看\u003ca href=\"https://github.com/Asutorufa/yuhaiin/tree/master/net/dns\">DNS\u003c/a>\u003c/p>\n\u003chr>\n\u003cp>DOH就比较简单了,因为DOH使用的请求数据和应答数据均为之前的DNS协议格式,包括DNS,EDNS,DNSSEC…当然是否支持EDNS,DNSSEC需要看DNS服务器的支持情况\u003cbr>\nDOH的最主要的区别是把DNS使用的UDP,换成了HTTPS,这样就能防止DNS污染了,而且可以使用DNSSEC加上ESNI来防止证书劫持,DOH的协议在\u003ca href=\"https://tools.ietf.org/html/rfc8484\">rfc8484\u003c/a>中有定义\u003cbr>\nDOH主要有两种方式HTTP的GET请求和POST的请求\u003c/p>\n\u003ch2 id=\"get\">GET\u003c/h2>\n\u003cp>GET请求需要使用BASE64对请求的字节数据进行序列化,然后作为参数传递,获取到的数据使用我们之前的解析进行解析就行了\u003c/p>\n\u003cpre class=\"hljs code-block\">\u003ccode class=\"language-go\">\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">1\u003c/span>\u003cspan class=\"code-line-content\">\u003cspan class=\"hljs-function\">\u003cspan class=\"hljs-keyword\">func\u003c/span> \u003cspan class=\"hljs-title\">get\u003c/span>\u003cspan class=\"hljs-params\">(dReq []\u003cspan class=\"hljs-type\">byte\u003c/span>, server \u003cspan class=\"hljs-type\">string\u003c/span>)\u003c/span>\u003c/span> (body []\u003cspan class=\"hljs-type\">byte\u003c/span>, err \u003cspan class=\"hljs-type\">error\u003c/span>) {\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">2\u003c/span>\u003cspan class=\"code-line-content\"> query := strings.Replace(base64.URLEncoding.EncodeToString(dReq), \u003cspan class=\"hljs-string\">&quot;=&quot;\u003c/span>, \u003cspan class=\"hljs-string\">&quot;&quot;\u003c/span>, \u003cspan class=\"hljs-number\">-1\u003c/span>)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">3\u003c/span>\u003cspan class=\"code-line-content\"> urls := \u003cspan class=\"hljs-string\">&quot;https://&quot;\u003c/span> + server + \u003cspan class=\"hljs-string\">&quot;/dns-query?dns=&quot;\u003c/span> + query\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">4\u003c/span>\u003cspan class=\"code-line-content\"> res, err := http.Get(urls)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">5\u003c/span>\u003cspan class=\"code-line-content\"> \u003cspan class=\"hljs-keyword\">if\u003c/span> err != \u003cspan class=\"hljs-literal\">nil\u003c/span> {\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">6\u003c/span>\u003cspan class=\"code-line-content\">  \u003cspan class=\"hljs-keyword\">return\u003c/span> \u003cspan class=\"hljs-literal\">nil\u003c/span>, err\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">7\u003c/span>\u003cspan class=\"code-line-content\"> }\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">8\u003c/span>\u003cspan class=\"code-line-content\"> \u003cspan class=\"hljs-keyword\">defer\u003c/span> res.Body.Close()\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">9\u003c/span>\u003cspan class=\"code-line-content\"> body, err = ioutil.ReadAll(res.Body)\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">10\u003c/span>\u003cspan class=\"code-line-content\"> \u003cspan class=\"hljs-keyword\">if\u003c/span> err != \u003cspan class=\"hljs-literal\">nil\u003c/span> {\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">11\u003c/span>\u003cspan class=\"code-line-content\">  \u003cspan class=\"hljs-keyword\">return\u003c/span> \u003cspan class=\"hljs-literal\">nil\u003c/span>, err\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">12\u003c/span>\u003cspan class=\"code-line-content\"> }\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">13\u003c/span>\u003cspan class=\"code-line-content\"> \u003cspan class=\"hljs-keyword\">return\u003c/span>\u003c/span>\u003c/span>\u003cspan class=\"code-line\">\u003cspan class=\"code-line-number\" aria-hidden=\"true\" style=\"--line-digits:2\">14\u003c/span>\u003cspan class=\"code-line-content\">}\u003c/span>\u003c/span>\u003c/code>\u003c/pre>\n\u003ch2 id=\"post\">POST\u003c/h2>\n\u003cp>POST并不需要进行序列化,直接把原始请求数据作为body就行了\u003c/p>\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[{"id":"get","text":"GET","level":2},{"id":"post","text":"POST","level":2}],"slugForSearch":"4b39445f","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/DNSSEC.md","route":"/posts/1751943e/","abbrlink":"1751943e","title":"DNSSEC","date":"2020-06-23 00:21:33","updated":"2020-06-23 00:21:33","tags":["DNS","UDP","DNSSEC","golang"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","loca
