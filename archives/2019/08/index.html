\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e os-prober\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e使用system-boot(就是直接使用linux内核引导系统,不再需要grub,如果有多系统不推荐,会把efi分区搞得很乱):\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-bash\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003epacman\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e -S\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e efibootmgr\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e dosfstools\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6A737D;--shiki-dark:#6A737D\"\u003e# 此处注意:此处要把efi分区挂载为/boot,而非平常的/boot/efi\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003ebootctl\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e install\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e --path=/boot\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"e3707853","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/CIDR匹配 域名匹配.md","route":"/posts/3cb4313e/","abbrlink":"3cb4313e","title":"CIDR匹配 域名匹配","date":"2019-08-02 18:55:15","updated":"2020-06-23 00:55:15","tags":["CIDR","Go"],"categories":["Network"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e所有完整实现代码:\u003ca href=\"https://github.com/Asutorufa/yuhaiin/tree/master/net/match\"\u003ematch\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"cidr\"\u003eCIDR\u003c/h2\u003e\n\u003cp\u003e我们知道cidr对ip匹配时,只要cidr的mask长度的前几位与要匹配的ip相同,则可以说匹配成功.\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-bash\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e假设有一个cidr为128.0.0.1/24\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e转换为二进制\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 0001/24\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e可以知道要匹配ip的前24为与cidr的前24(1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e)位相同则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e假设有一个ip\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 128.0.0.128\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 二进制为\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.0000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000.1000\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e 0000\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e可以看到前24位与cidr相同\u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e 则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"域名\"\u003e域名\u003c/h2\u003e\n\u003cp\u003e域名就比较简单了,直接按点分割就行了\u003c/p\u003e\n\u003ch2 id=\"前缀树\"\u003e前缀树\u003c/h2\u003e\n\u003cp\u003e通过上述规则 我们可以使用前缀树实现CIDR对ip的匹配\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-bash\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e            root\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e           /\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e    \\\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e          0\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e      1\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e         /\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e \\ \u003c/span\u003e\u003cspan style=\"color:#032F62;--shiki-dark:#9ECBFF\"\u003e   /\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e \\\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e        0\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e   1\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e  0\u003c/span\u003e\u003cspan style=\"color:#005CC5;--shiki-dark:#79B8FF\"\u003e   1\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e       /\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e    当ip匹配到此处,此处已无任何子树,且是某一cidr的末尾时则匹配成功\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e    若此处节点为null(golang为nil\u003c/span\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e)且不是某一cidr的末尾时则匹配失败\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e域名的前缀树相同,只不过域名不再是只有0和1,而且在匹配的时候还需要跳过前面的那些前缀.\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-bash\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#6F42C1;--shiki-dark:#B392F0\"\u003e        +---------+\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u0
