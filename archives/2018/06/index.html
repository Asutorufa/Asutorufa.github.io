3c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e将ubuntu的grubx64.efi替换掉EFI/Microsoft/Boot/bootmgfw.efi文件\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"6683eff9","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/関西弁コレクション.md","route":"/posts/a4241e7/","abbrlink":"a4241e7","title":"関西弁コレクション","date":"2018-06-21 09:42:02","updated":"2025-09-06 09:42:02","tags":["関西弁"],"categories":["日本語"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"","excerptHtml":"\u003cp\u003e普段発見の関西弁ここで記録します。\u003c/p\u003e\n\u003cp\u003e–\u003cstrong\u003e2025年9月6日\u003c/strong\u003e–\u003c/p\u003e\n\u003cp\u003eほな\u003c/p\u003e\n\u003cp\u003e大阪弁の「ほな」は、「それでは」「では」「それじゃあ」「じゃあ」といった意味で、接続詞としても、別れ際の挨拶としても使われます。また、前後の文脈によって「それなら」といった意味で使われることもあり、非常に汎用性の高い言葉です。\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003eしばく\u003c/p\u003e\n\u003cp\u003e「しばく」には、物を棒などで強く叩くという意味と、大阪弁で軽い飲食や遊びに行くことを指す用法があります。前者は文字通り暴力的な意味合いですが、後者は「茶しばく」（お茶する）のように、親しい間柄での軽い誘いや日常的な表現として使われ、本気で殴るつもりはありません。\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e–\u003cstrong\u003e2020年1月30日\u003c/strong\u003e–\u003cbr\u003e\nおらん とはどういう意味ですか?\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e文からするとその方は関西の人ですかね。おらんは方言で、「いない」という意味です。\u003cbr\u003e\n例文：\u003cem\u003e俺も一緒やな 3年ぐらいはおらん。\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e–\u003cstrong\u003e2019年2月1日\u003c/strong\u003e–\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e①関西弁の～ねんけど、～やねん、～ねんの意味を教えて下さい\u003cbr\u003e\n②～ねやは～ですかの意味ですか？それ意外に意味、使い方等は有りますか？\u003cbr\u003e\n③言葉の関西弁のアクセントを教えて下さい\u003c/p\u003e\n\u003cp\u003e①・・・\u003cbr\u003e\n～ねんけど ですけれど（〇〇なんですけれど）\u003cbr\u003e\n～やねん、～ねん です（〇〇なんです）\u003c/p\u003e\n\u003cp\u003e②・・・\u003cbr\u003e\n～ねやは～（～やねん”わ”～ですね。）\u003cbr\u003e\n〇○なんですよ。\u003c/p\u003e\n\u003cp\u003e③・・・\u003cbr\u003e\n～ねんけど（中中）\u003cbr\u003e\n～やねん（高低）\u003cbr\u003e\n～やねんわ～（高低中）\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"a4241e7","comments":true,"math":false,"mermaid":false}],"totalPages":1,"totalPosts":4}</script><script type="module" src="/assets/index-Dd-pc75q.js"></script></body></html>
