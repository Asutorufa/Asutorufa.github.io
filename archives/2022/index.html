e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e已知3个点(4,10)(5,5.25)(6,1)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003el0 = (((x-5)(x-6))/((4-5)(4-6))) * 10\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003el1 = (((x-4)(x-6))/((5-4)(5-6))) * 5.25\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003el2 = (((x-4)(x-5))/((6-4)(6-5))) * 1\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003ef(x) = l0+l1+l2 = 1/4(x^2-28x+136)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"shamir-秘密共享\"\u003eShamir 秘密共享\u003c/h2\u003e\n\u003cp\u003e生成\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"ce6c7d90","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/离散对数问题.md","route":"/posts/1f299eb2/","abbrlink":"1f299eb2","title":"离散对数问题","date":"2022-08-15 10:03:28","updated":"2022-08-15 10:03:28","tags":["Crypto","离散对数","DH密钥交换","Elgamal"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003cp\u003e前置知识 欧拉, 欧拉定理, 模反元素(模逆元) 可参见: \u003ca href=\"/posts/f1a158c9/\"\u003eRSA加密\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"阶\"\u003e阶\u003c/h2\u003e\n\u003cp\u003e由欧拉定理可知，若n,a为正整数，且n,a互素（即gcd(a,n)=1），则 a^phi(n) = 1 (mod n)。\u003cbr\u003e\n因此满足同余式 a^m = 1 (mod n)的\u003cstrong\u003e最小正整数m\u003c/strong\u003e存在，这个m称作a模n的阶，记作delta(n,a)。\u003c/p\u003e\n\u003ch2 id=\"原根\"\u003e原根\u003c/h2\u003e\n\u003cp\u003e若n,a为正整数，且n,a互质，如果 gcd(a,n)=1 且 delta(n,a) = phi(n), 则称a为模n的原根.\u003cbr\u003e\n简单来说，使该式成立的d可能有很多个值，又由欧拉定理可知delta(n,a) = phi(n)一定是满足的，如果此时所有delta(n,a)的可能取值中phi(n)是最小的，那么就称a为模n的原根。\u003c/p\u003e\n\u003cp\u003eeg:\u003c/p\u003e\n\u003cpre class=\"shiki code-block language-markdown\"\u003e\u003ccode\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003ea=3, n=7\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e可知 3,7互质, 所以phi(n) = 7 - 1 = 6\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e可得 3^6 = 1 (mod 7)\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003e计算3^1, 3^2, 3^3, 3^4, 3^5 (mod 7) 都不等于1, 所以 6为满足 a^x = 1 (mod n)的最小正整数\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"code-line\"\u003e\u003cspan class=\"code-line-content\"\u003e\u003cspan style=\"color:#24292E;--shiki-dark:#E1E4E8\"\u003edelta(7,3) = 6 = phi(7), 可得 3为模7的原根\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 id=\"性质\"\u003e性质\u003c/h3\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"1f299eb2","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/加密模式.md","route":"/posts/903c04f7/","abbrlink":"903c04f7","title":"加密模式","date":"2022-08-14 22:09:15","updated":"2022-08-14 22:09:15","tags":["Crypto","AEAD","流密码","块密码","Chacha20-Poly1305"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003ch2 id=\"流密码\"\u003e流密码\u003c/h2\u003e\n\u003cp\u003e密码学中，流密码（英語：Stream cipher），又譯為串流加密、資料流加密，是一种对称加密算法，加密和解密双方使用相同伪随机加密数据流（pseudo-random stream）作为密钥，明文数据每次与密钥数据流顺次对应加密，得到密文数据流。实践中数据通常是一个位（bit）并用异或（xor）操作加密。\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://zh.wikipedia.org/wiki/%E6%B5%81%E5%AF%86%E7%A0%81\"\u003ehttps://zh.wikipedia.org/wiki/流密码\u003c/a\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003echacha20/salsa20\u003c/li\u003e\n\u003cli\u003erc4\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"块密码分组密码\"\u003e块密码/分组密码\u003c/h2\u003e\n\u003cp\u003e块密码只能对确定长度的数据块进行处理, 如aes每个块的大小必须为16, 如果不满16就需要进行padding\u003c/p\u003e\n\u003ch3 id=\"加密模式\"\u003e加密模式\u003c/h3\u003e\n\u003ch4\u003eECB\u003c/h4\u003e\n\u003cp\u003e最简单的加密模式即为电子密码本（Electronic codebook，ECB）模式。需要加密的消息按照块密码的块大小被分为数个块，并对每个块进行独立加密。\u003c/p\u003e\n\u003ch4\u003eCBC\u003c/h4\u003e\n\u003cp\u003e在CBC模式中，每个明文块先与前一个密文块进行异或后，再进行加密。在这种方法中，每个密文块都依赖于它前面的所有明文块。同时，为了保证每条消息的唯一性，在第一个块中需要使用初始化向量。\u003c/p\u003e\n\u003ch4\u003ePCBC\u003c/h4\u003e\n\u003cp\u003e填充密码块链接（PCBC，Propagating cipher-block chaining）或称为明文密码块链接（Plaintext cipher-block chaining），是一种可以使密文中的微小更改在解密时导致明文大部分错误的模式，并在加密的时候也具有同样的特性。\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"903c04f7","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/TUN网卡.md","route":"/posts/a67af13f/","abbrlink":"a67af13f","title":"TUN网卡","date":"2022-08-14 21:46:33","updated":"2022-08-14 21:46:33","tags":["Go","Tun","Kotlin"],"categories":["Network"],"language":"ja","htmlLang":"ja","locale":"ja_JP","textDirection":"ltr","dateLocale":"ja-JP","excerptMarkdown":"","excerptHtml":"\u003cp\u003eGolang Tun (gVisor) 完整代码: tun Android VPN Service Android 的VPN Service只能处理Tun接口 完整代码: VpnService\u003c/p\u003e\n","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"a67af13f","comments":true,"math":false,"mermaid":false},{"kind":"post","sourcePath":"source/_posts/RSA加密.md","route":"/posts/f1a158c9/","abbrlink":"f1a158c9","title":"RSA加密","date":"2022-08-14 21:46:24","updated":"2022-08-14 21:46:24","tags":["Crypto","RSA"],"categories":["Crypto"],"language":"zh-Hans","htmlLang":"zh-Hans","locale":"zh_CN","textDirection":"ltr","dateLocale":"zh-CN","excerptMarkdown":"","excerptHtml":"\u003ch2 id=\"质数\"\u003e质数\u003c/h2\u003e\n\u003cp\u003e质数（Prime number），又称素数，指在大于1的自然数中，除了1和该数自身外，无法被其他自然数整除的数（也可定义为只有1与该数本身两个正因数的数）。\u003c/p\u003e\n\u003cp\u003e来自 \u003ca href=\"https://zh.wikipedia.org/wiki/%E8%B4%A8%E6%95%B0\"\u003ehttps://zh.wikipedia.org/wiki/质数\u003c/a\u003e\u003c/p\u003e\n\u003ch3 id=\"互质\"\u003e互质\u003c/h3\u003e\n\u003cp\u003e互质是公约数只有1的两个整数，也可记gcd(a,b)=1, 叫做互质整数。\u003c/p\u003e\n\u003ch2 id=\"欧拉\"\u003e欧拉\u003c/h2\u003e\n\u003cp\u003e在数论中，对正整数n，欧拉函数phi(n)是小于等于n的正整数中与n互质的数的数目。此函数以其首名研究者欧拉命名，它又称为φ函数（由高斯所命名）或是欧拉总计函数（totient function，由西尔维斯特所命名）。\u003c/p\u003e\n\u003cp\u003e来自 \u003ca href=\"https://zh.wikipedia.org/wiki/%E6%AC%A7%E6%8B%89%E5%87%BD%E6%95%B0\"\u003ehttps://zh.wikipedia.org/wiki/欧拉函数\u003c/a\u003e\u003c/p\u003e\n","moreAnchor":"more","bodyMarkdown":"","bodyHtml":"","rawMarkdown":"","plainText":"","toc":[],"slugForSearch":"f1a158c9","comments":true,"math":false,"mermaid":false}],"totalPages":1,"totalPosts":6}</script><script type="module" src="/assets/index-Dd-pc75q.js"></script></body></html>
