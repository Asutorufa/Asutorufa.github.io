  <script>
    (() => {
      const canonicalHost = "asutorufa.com";
      const canonicalOrigin = "https://asutorufa.com";
      const hostname = location.hostname;
      const localHost =
        location.protocol === "file:" ||
        hostname === "localhost" ||
        hostname.endsWith(".localhost") ||
        hostname.endsWith(".local") ||
        hostname === "0.0.0.0" ||
        hostname === "127.0.0.1" ||
        hostname === "::1" ||
        hostname === "[::1]" ||
        /^127(?:\.\d{1,3}){3}$/.test(hostname) ||
        /^10(?:\.\d{1,3}){3}$/.test(hostname) ||
        /^192\.168(?:\.\d{1,3}){2}$/.test(hostname) ||
        /^172\.(?:1[6-9]|2\d|3[0-1])(?:\.\d{1,3}){2}$/.test(hostname);

      if (!localHost && (hostname !== canonicalHost || location.protocol !== "https:")) {
        location.replace(canonicalOrigin + location.pathname + location.search + location.hash);
      }
    })();
  </script>
  <script>

    })();
