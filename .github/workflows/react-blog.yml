name: React Blog

on:
  push:
    branches: ["react"]
  pull_request:
    branches: ["react"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm

      - name: Restore React blog build cache
        uses: actions/cache@v6
        with:
          path: |
            .cache/react-blog
            dist-react/assets
            dist-react/.vite
          key: react-blog-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json', 'vite.config.mts', 'tsconfig.json', 'index.html', 'src/**') }}
          restore-keys: |
            react-blog-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build React static blog
        run: npm run react:build

      - name: Disable GitHub Pages Jekyll
        run: touch dist-react/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name != 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-react
          publish_branch: master
